<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="theme-color" content="#1a1a2e">
    <title>Fantasy Idle: Tiered Magic</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; text-align: center; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        #mana-display { font-size: 2.5em; color: #4ecca3; margin: 10px; }
        
        /* Mobile Responsive Container */
        #combat-section {
            width: 90%;
            max-width: 400px;
            background: #16213e;
            border: 2px solid #e94560;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
        }

        #monster-sprite { font-size: clamp(50px, 15vw, 80px); transition: transform 0.1s; cursor: pointer; }
        .monster-pulse { animation: pulse-red 0.5s infinite; }
        @keyframes pulse-red { 0% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 10px #e94560); } 100% { filter: brightness(1); } }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s; }
        
        .damage-popup { position: absolute; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

        /* Shop Layout */
        .shop-container { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .upgrade-card { 
            background: #16213e; 
   			border: 1px solid #4ecca3; 
    		padding: 15px; 
    		width: 90%; 
    		max-width: 400px; 
    		border-radius: 12px; 
    		display: flex; 
    		justify-content: space-between; 
    		align-items: center; 
    		margin-bottom: 10px;
        }

        /* Buttons */
        button { background: #4ecca3; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; touch-action: manipulation; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; opacity: 0.6; }
        .nav-btn { border-radius: 8px 8px 0 0; background: #16213e; color: white; margin: 0 5px; }
        .nav-btn.active { background: #4ecca3; color: #1a1a2e; }

        .floating-text { position: fixed; color: #4ecca3; font-weight: bold; font-size: 1.5rem; pointer-events: none; animation: floatAndFade 0.8s forwards; z-index: 1000; }
        @keyframes floatAndFade { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -100px); } }
	
	#compendium-list .upgrade-card {
   	 flex-direction: column;
   	 text-align: left;
   	 height: auto;
   	 min-height: 100px;
	}

	.upgrade-card div {
    	   transition: transform 0.2s;
	}
	.upgrade-card:hover div {
    	   transform: scale(1.05);
	}
	
	#compendium-list {
    	   display: grid;
   	   grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    	   gap: 15px;
    	   padding: 10px;
	}

    </style>
</head>
<body>

    <h1>Mana Sanctum</h1>

    <div id="stats-dashboard" style="background: #16213e; border: 1px solid #4ecca3; padding: 10px; border-radius: 8px; width: 250px; margin: 10px auto;">
        <div style="font-size: 0.7em; color: #4ecca3; text-transform: uppercase;">Arcane Flow</div>
        <div id="total-mps-display">0 Mana/sec</div>
    </div>
    
    <div class="nav-bar" style="margin-top: 20px;">
        <button id="sanctum-btn" onclick="showTab('sanctum')" class="nav-btn active">Sanctum</button>
        <button id="battle-btn" onclick="showTab('battle')" class="nav-btn">Battle Rift</button>
	<button onclick="showTab('compendium')" class="nav-btn">Compendium</button>
    </div>

    <div id="sanctum-tab" class="tab-content">
        <div id="mana-display">Mana: 0</div>
        <button onclick="clickMana(event)" style="width: 200px; height: 60px; margin-bottom: 20px;">Gather Mana</button>
        <div class="shop-container" id="shop"></div>
    </div> <div id="battle-tab" class="tab-content" style="display: none;">
        <div id="combat-section">
            <h2 style="color: #e94560; margin: 0;">Arcane Rift</h2>
            <div id="monster-container" style="height: 120px; display: flex; align-items: center; justify-content: center; position: relative;">
                <div id="monster-sprite" class="monster-pulse" onclick="attackMonster()">👿</div>
            </div>
            <div id="monster-name" style="font-weight: bold;">Shadow Imp</div>
            <div style="color: #e94560;">Essence: <span id="essence-display">0</span></div>
            
            <div style="width: 100%; background: #0f3460; height: 20px; border-radius: 10px; margin: 10px 0; border: 1px solid #e94560; overflow: hidden;">
                <div id="hp-bar" style="width: 100%; background: #e94560; height: 100%; transition: width 0.1s;"></div>
            </div>
            <div id="hp-text">HP: 50 / 50</div>
            
            <button onclick="attackMonster()" id="attack-btn" style="background: #e94560; color: white; width: 100%; margin-top: 10px;">
                Cast Blast (10 Mana)
            </button>
        </div>

        <div id="artifact-vault">
            <h3 style="color: #4ecca3;">Arcane Upgrades</h3>
            <div id="artifact-list" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;"></div>
        </div>
    </div> <div id="compendium-tab" class="tab-content" style="display: none; padding: 20px;">
        <h2 style="color: #4ecca3;">Mystic Compendium</h2>
        <p style="font-size: 0.9em; color: #888; margin-bottom: 20px;">A record of all known Arcane relics.</p>
        <div id="compendium-list" class="shop-container"></div>
    </div>

<div id="admin-menu" style="display: none; position: fixed; bottom: 20px; right: 20px; background: #222; border: 2px solid #ff0055; padding: 20px; border-radius: 10px; z-index: 9999; text-align: left; box-shadow: 0 0 20px #000;">
    <h3 style="color: #ff0055; margin-top: 0;">Arcane Debugger</h3>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <button onclick="cheatMana()">+1 Million Mana</button>
        <button onclick="cheatEssence()">+100 Essence</button>
        <button onclick="instaKill()">Insta-Kill Monster</button>
        <button onclick="unlockAllArtifacts()">Unlock All Artifacts</button>
        <button onclick="saveGame()" style="background: #4ecca3;">Manual Save</button>
        <button onclick="deleteSave()" style="background: #e94560;">Wipe Progress</button>
    </div>
    <p style="font-size: 0.7em; color: #888; margin-top: 10px;">Press ~ to toggle</p>
</div>

   <script>

// Toggle menu with the ` key (usually top left of keyboard)
window.addEventListener('keydown', (e) => {
    if (e.key === '`' || e.key === '~') {
        const menu = document.getElementById('admin-menu');
        if (menu.style.display === 'none') {
            menu.style.display = 'block';
        } else {
            menu.style.display = 'none';
        }
    }
});

    // 1. Core Variables
    let mana = 0;
    let essence = 0;
    let globalMPS = 0;
    let monsterHP = 50;
    let monsterMaxHP = 50;
    let monstersDefeated = 0;
    let passiveDamageBuffer = 0;
    let passiveTimer = 0;
    let baseTickSpeed = 100;

    const artifactPool = [
    { 
        id: "wand", name: "Ancient Wand", icon: "🪄", owned: false, level: 1, 
        bonus: 2, desc: "A splintered branch from the World Tree. Increases Click & Blast damage." 
    },
    { 
        id: "robe", name: "Scholar's Robe", icon: "🥋", owned: false, level: 1, 
        bonus: 0.1, desc: "Woven with silver thread. Grants a 10% discount on all Sanctum upgrades." 
    },
    { 
        id: "orb", name: "Crystal Ball", icon: "🔮", owned: false, level: 1, 
        bonus: 0.25, desc: "Allows you to see the flow of mana. Increases Global MPS by 25%." 
    },
    { 
    id: "hourglass", 
    name: "Temporal Hourglass", 
    icon: "⏳", 
    owned: false, 
    level: 1, 
    bonus: 0.05, 
    desc: "Warps the flow of time. Each level makes the game tick 5% faster." 
},
    { 
    id: "pouch", 
    name: "Bottomless Pouch", 
    icon: "💰", 
    owned: false, 
    level: 1, 
    bonus: 1.2, 
    desc: "A pouch that smells of old copper. Monsters drop 20% more Essence." 
    }
];

    const upgrades = [
        { id: 'scribe', name: 'Apprentice Scribe', cost: 10, mps: 1, count: 0 },
        { id: 'well', name: 'Mana Well', cost: 100, mps: 8, count: 0 },
        { id: 'library', name: 'Arcane Library', cost: 1000, mps: 45, count: 0 },
        { id: 'tower', name: 'Wizard Tower', cost: 5000, mps: 200, count: 0 },
		{ id: 'ball', name: 'Palantir', cost: 7500, mps: 400, count: 0 }
    ];

    // 2. Tab Logic
    function showTab(tabName) {
    document.getElementById('sanctum-tab').style.display = 'none';
    document.getElementById('battle-tab').style.display = 'none';
    document.getElementById('compendium-tab').style.display = 'none';

    const activeTab = document.getElementById(tabName + '-tab');
    if (activeTab) activeTab.style.display = 'block';

    // RE-RENDER LOGIC
    if (tabName === 'sanctum') {
        renderShop(); // Draw shop when entering Sanctum
    }
    if (tabName === 'battle') {
        renderArtifacts(); // Draw upgrades when entering Battle
    }
    if (tabName === 'compendium') {
        renderCompendium();
    }
}

    // 3. Combat Logic
    function attackMonster() {
        if (monsterHP <= 0 || mana < 10) return;

        mana -= 10;
        let dmg = 5 + (globalMPS * 0.1);
        const wand = artifactPool.find(a => a.id === 'wand');
        if (wand && wand.owned) dmg *= wand.bonus;

        monsterHP -= dmg;
        
        // Visuals
        const sprite = document.getElementById('monster-sprite');
        sprite.classList.remove('shake');
        void sprite.offsetWidth; 
        sprite.classList.add('shake');
        createDamagePopup(Math.ceil(dmg), false);

        if (monsterHP <= 0) defeatMonster();
        
        updateCombatUI();
        updateUI();
    }

    function createDamagePopup(amount, isPassive) {
        const container = document.getElementById('monster-container');
        const p = document.createElement('div');
        p.className = 'damage-popup';
        p.innerText = isPassive ? amount : `-${amount}`;
        p.style.color = isPassive ? "#4ecca3" : "#ff0055";
        p.style.left = `calc(50% + ${Math.random() * 40 - 20}px)`;
        container.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    function defeatMonster() {
        monstersDefeated++;
        essence += Math.ceil((monstersDefeated / 2) * (artifactPool.find(a => a.id === 'pouch').owned ? 1.2 : 1));
        mana += (monsterMaxHP * 2);
        
        document.getElementById('monster-name').innerText = "Rift Opening...";
        monsterHP = 0; 

        setTimeout(() => {
            monsterMaxHP = Math.floor(monsterMaxHP * 1.4);
            monsterHP = monsterMaxHP;
            const monsters = [
                { name: "Shadow Imp", icon: "👿" },
                { name: "Void Wraith", icon: "👻" },
                { name: "Chaos Golem", icon: "🗿" },
                { name: "Abyssal Drake", icon: "🐲" }
            ];
            const idx = Math.min(Math.floor(monstersDefeated / 5), monsters.length - 1);
            document.getElementById('monster-name').innerText = monsters[idx].name;
            document.getElementById('monster-sprite').innerText = monsters[idx].icon;
            updateCombatUI();
        }, 1000);
    }

    // 4. UI & Core Loop
   function updateUI() {
    const mpsDisplay = document.getElementById('total-mps-display');
    const manaDisplay = document.getElementById('mana-display');
    const essenceDisplay = document.getElementById('essence-display');

    if (mpsDisplay) mpsDisplay.innerText = `${globalMPS.toLocaleString()} Mana/sec`;
    if (manaDisplay) manaDisplay.innerText = `Mana: ${Math.floor(mana).toLocaleString()}`;
    if (essenceDisplay) essenceDisplay.innerText = essence;

    const attackBtn = document.getElementById('attack-btn');
    if (attackBtn) {
        attackBtn.disabled = (mana < 10 || monsterHP <= 0);
    upgrades.forEach((upg, index) => {
        const btn = document.getElementById(`btn-${index}`);
        if (btn) {
            const robe = artifactPool.find(a => a.id === 'robe');
            const discount = (robe && robe.owned) ? 0.9 : 1;
            btn.disabled = (mana < Math.floor(upg.cost * discount));
        }
    });
}

    function renderArtifacts() {
    const list = document.getElementById('artifact-list');
    if (!list) return;

    const owned = artifactPool.filter(art => art.owned);
    if (owned.length === 0) {
        list.innerHTML = `<p style="color: #666; font-style: italic;">Defeat monsters to discover rare artifacts...</p>`;
        return;
    }

    list.innerHTML = "";
    owned.forEach(art => {
        const upgCost = art.level * 5;
        list.innerHTML += `
            <div style="background: #0f3460; border: 1px solid #4ecca3; padding: 15px; border-radius: 10px; width: 120px; text-align: center;">
                <div style="font-size: 2em; margin-bottom: 5px;">${art.icon}</div>
                <div style="font-weight: bold; color: white; font-size: 0.9em;">${art.name}</div>
                <div style="font-size: 0.8em; color: #4ecca3; margin-bottom: 5px;">Lv. ${art.level}</div>
                <button onclick="upgradeArtifact('${art.id}')" 
                        style="font-size: 0.7em; width: 100%; padding: 5px; cursor: pointer;"
                        ${essence < upgCost ? 'disabled' : ''}>
                    Upgrade (${upgCost})
                </button>
            </div>
        `;
    });
}

    function updateCombatUI() {
        const pct = Math.max(0, (monsterHP / monsterMaxHP) * 100);
        document.getElementById('hp-bar').style.width = pct + "%";
        document.getElementById('hp-text').innerText = `HP: ${Math.ceil(monsterHP)} / ${monsterMaxHP}`;
    }

    function clickMana(event) {
    // 1. Calculate how much mana to give
    const wandBonus = artifactPool.find(a => a.id === 'wand').owned ? 2 : 1;
    mana += (1 * wandBonus);

    // 2. Create the floating "+1" text at mouse position
    const particle = document.createElement('div');
    particle.className = 'floating-text';
    particle.innerText = `+${1 * wandBonus}`;

    // Position it where the user clicked
    particle.style.left = event.clientX + 'px';
    particle.style.top = event.clientY + 'px';

    document.body.appendChild(particle);

    // Cleanup the particle after animation
    setTimeout(() => {
        particle.remove();
    }, 800);

    // 3. UI "Bump" effect
    const display = document.getElementById('mana-display');
    if (display) {
        display.style.transform = 'scale(1.1)';
        setTimeout(() => display.style.transform = 'scale(1)', 50);
    }

    updateUI();
}

    function gameLoop() {
    // 1. Calculate Tick Speed based on Hourglass
    const hourglass = artifactPool.find(a => a.id === 'hourglass');
    let speedMultiplier = (hourglass && hourglass.owned) ? (1 - hourglass.bonus) : 1;
    
    // Safety cap: don't let the game run faster than 20ms per tick
    let currentTickSpeed = Math.max(20, baseTickSpeed * speedMultiplier);

    // 2. The standard game logic
    mana += (globalMPS / 10);
    
    if (monsterHP > 0) {
        let pDmg = (globalMPS * 0.01);
        monsterHP -= pDmg;
        passiveDamageBuffer += pDmg;
        if (monsterHP <= 0) defeatMonster();
    }
    
    passiveTimer++;
    if (passiveTimer >= 10) {
        if (passiveDamageBuffer >= 1) createDamagePopup(Math.ceil(passiveDamageBuffer), true);
        passiveDamageBuffer = 0;
        passiveTimer = 0;
    }

    updateUI();
    updateCombatUI();

    // 3. Schedule the next tick
    setTimeout(gameLoop, currentTickSpeed);
}
       
    // 5. Saving 
    function saveGame() {
    try {
        const state = { 
            mana, essence, globalMPS, monsterMaxHP, monstersDefeated,
            upgrades: upgrades.map(u => ({count: u.count, cost: u.cost})),
            artifacts: artifactPool.map(a => ({id: a.id, owned: a.owned, level: a.level})) 
        };
        localStorage.setItem("wizardIdleSave", JSON.stringify(state));
        console.log("Game Saved successfully!");
    } catch (e) {
        console.warn("Save failed: Local storage is restricted on file:// URLs. Try using a Live Server or a different browser.");
    }
}
    
    function loadGame() {
    const savedData = localStorage.getItem("wizardIdleSave");
    if (!savedData) return; // No save found, start fresh

    const data = JSON.parse(savedData);

    
    mana = data.mana || 0;
    essence = data.essence || 0;
    globalMPS = data.globalMPS || 0;
    monsterMaxHP = data.monsterMaxHP || 50;
    monsterHP = monsterMaxHP; 
    monstersDefeated = data.monstersDefeated || 0;

    
    if (data.upgrades && Array.isArray(data.upgrades)) {
        data.upgrades.forEach((savedUpg, i) => {
            if (upgrades[i]) {
                upgrades[i].count = savedUpg.count || 0;
                upgrades[i].cost = savedUpg.cost || upgrades[i].cost;
            }
        });
    }

    
    if (data.artifacts && Array.isArray(data.artifacts)) {
        data.artifacts.forEach(savedArt => {
            const art = artifactPool.find(a => a.id === savedArt.id);
            if (art) {
                art.owned = savedArt.owned || false;
                art.level = savedArt.level || 1;
            }
        });
    }

    // 4. Recalculate and Refresh
    calculateMPS();
    updateUI();
    updateCombatUI();
}

    function renderShop() {
    const shop = document.getElementById('shop');
    if (!shop) return;
    
    shop.innerHTML = ""; 
    upgrades.forEach((upg, index) => {
        const affordable = getAffordableAmount(upg, mana);
        
        
        const robe = artifactPool.find(a => a.id === 'robe');
        const robeDiscount = (robe && robe.owned) ? 0.9 : 1;
        const currentCost = Math.floor(upg.cost * robeDiscount);

        shop.innerHTML += `
            <div class="upgrade-card">
                <div class="info">
                    <strong>${upg.name}</strong> 
                    <span class="level-badge">Lv. ${upg.count}</span><br>
                    <small>+${upg.mps} Mana/sec</small>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <button id="btn-${index}" onclick="buyUpgrade(${index})" ${mana < currentCost ? 'disabled' : ''}>
                        Buy: ${currentCost.toLocaleString()}
                    </button>
                    <button onclick="buyMax(${index})" style="background: #0f3460; font-size: 0.7em;" ${affordable === 0 ? 'disabled' : ''}>
                        Max (+${affordable})
                    </button>
                </div>
            </div>`;
    });
}

function buyUpgrade(index) {
    const upg = upgrades[index];
    
    
    const robe = artifactPool.find(a => a.id === 'robe');
    const robeDiscount = (robe && robe.owned) ? 0.9 : 1;
    const finalCost = Math.floor(upg.cost * robeDiscount);

    
    if (mana >= finalCost) {
        mana -= finalCost;
        upg.count++;
        
        upg.cost = Math.floor(upg.cost * 1.15); 
        
        calculateMPS();
        updateUI();
		renderShop();
        saveGame(); 
    } else {
        console.log("Not enough mana! Need: " + finalCost);
    }
}

function buyMax(index) {
    const upg = upgrades[index];
    const robe = artifactPool.find(a => a.id === 'robe');
    const robeDiscount = (robe && robe.owned) ? 0.9 : 1;
    
    let count = 0;
    
    while (mana >= Math.floor(upg.cost * robeDiscount)) {
        mana -= Math.floor(upg.cost * robeDiscount);
        upg.count++;
        upg.cost = Math.floor(upg.cost * 1.15);
        count++;
    }

    if (count > 0) {
        calculateMPS();
        updateUI();
        saveGame();
    }
}

function calculateMPS() {
    globalMPS = upgrades.reduce((total, upg) => total + (upg.count * upg.mps), 0);
}

function getAffordableAmount(upg, currentMana) {
    let count = 0;
    let tempCost = upg.cost;
    let tempMana = currentMana;
    
    
    const robe = artifactPool.find(a => a.id === 'robe');
    const robeDiscount = (robe && robe.owned) ? 0.9 : 1;

    
    let safetyIterator = 0; 
    while (tempMana >= Math.floor(tempCost * robeDiscount) && safetyIterator < 1000) {
        tempMana -= Math.floor(tempCost * robeDiscount);
        tempCost = Math.floor(tempCost * 1.15);
        count++;
        safetyIterator++;
    }
    return count;
}

function upgradeArtifact(id) {
    const art = artifactPool.find(a => a.id === id);
    if (!art || essence < (art.level * 5)) return;

    essence -= (art.level * 5);
    art.level++;
    
    // Improved logic to handle ALL current artifacts
    if (id === 'wand') {
        art.bonus += 1; 
    } else if (id === 'pouch') {
        art.bonus += 0.1; // Increases essence drop by 10% per level
    } else {
        art.bonus += 0.05; // Standard 5% bump for the others
    }

    updateUI();
    renderArtifacts();
    saveGame();
}

function renderCompendium() {
    const list = document.getElementById('compendium-list');
    if (!list) return;

    list.innerHTML = "";
    artifactPool.forEach(art => {
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        
        // --- STYLING FIXES FOR CENTERING ---
        card.style.flexDirection = "column"; // Stack icon on top of text
        card.style.alignItems = "center";    // Center items horizontally
        card.style.textAlign = "center";     // Center the text lines
        card.style.padding = "20px";
        card.style.minHeight = "150px";

        if (art.owned) {
            card.innerHTML = `
                <div style="font-size: 3em; margin-bottom: 10px;">
                    ${art.icon}
                </div>
                <div style="width: 100%;">
                    <strong style="color: #4ecca3; font-size: 1.2em; display: block; margin-bottom: 5px;">
                        ${art.name}
                    </strong>
                    <p style="margin: 5px 0; font-size: 0.9em; color: #ccc; line-height: 1.4;">
                        ${art.desc}
                    </p>
                    <div style="margin-top: 10px; color: #4ecca3; font-weight: bold; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px;">
                        Power: x${art.bonus}
                    </div>
                </div>
            `;
        } else {
            card.style.opacity = "0.3";
            card.style.filter = "grayscale(1)";
            card.style.border = "1px dashed #444";
            card.innerHTML = `
                <div style="font-size: 3em; margin-bottom: 10px; color: #444;">❓</div>
                <div style="width: 100%;">
                    <strong style="color: #666; font-size: 1.1em; display: block;">??? Locked ???</strong>
                    <p style="margin: 5px 0; font-size: 0.85em; color: #444; font-style: italic;">
                        Defeat more monsters to reveal this artifact.
                    </p>
                </div>
            `;
        }
        list.appendChild(card);
    });
}

function cheatMana() {
    mana += 1000000;
    updateUI();
}

function cheatEssence() {
    essence += 100;
    updateUI();
    renderArtifacts();
}

function instaKill() {
    if (monsterHP > 0) {
        monsterHP = 0;
        updateCombatUI();
        defeatMonster();
    }
}

function unlockAllArtifacts() {
    artifactPool.forEach(art => art.owned = true);
    renderArtifacts();
    renderCompendium(); 
    updateUI();
}

function deleteSave() {
    if (confirm("Are you sure? This will permanently delete all mana, essence, and artifacts!")) {
        localStorage.removeItem("wizardIdleSave");
        location.reload(); 
    }
}

// --- INITIALIZATION (This makes the game start) ---
// This part must be at the very end to ensure all functions are loaded first
try {
    loadGame();      
    calculateMPS();  
    renderShop();    
    updateUI();      
    gameLoop();      
} catch (err) {
    console.error("Initialization failed:", err);
}

</script>
</body>
</html>
