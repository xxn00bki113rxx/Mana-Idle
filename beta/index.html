<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="theme-color" content="#1a1a2e">
    <title>Fantasy Idle: Tiered Magic</title>
    <style>
    /* 1. GLOBAL THEME & LAYOUT */
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: #1a1a2e; 
        color: #fff; 
        text-align: center; 
        margin: 0; 
        padding-bottom: 50px; 
        overflow-x: hidden; 
    }

    #mana-display { 
        font-size: 2.5em; 
        color: #4ecca3; 
        margin: 10px; 
        text-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
    }

    /* 2. COMBAT SECTION & MONSTER */
    #combat-section {
        width: 90%;
        max-width: 400px;
        background: #16213e;
        border: 2px solid #e94560;
        padding: 20px;
        border-radius: 20px; /* Highly rounded for modern feel */
        margin: 20px auto;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #monster-sprite { 
        font-size: clamp(60px, 18vw, 90px); 
        transition: transform 0.1s, filter 0.2s; 
        cursor: pointer; 
        display: inline-block;
        user-select: none;
        padding: 10px;
    }

    #monster-sprite:active {
        transform: scale(0.9); /* Tactile "squish" on click */
    }

    /* 3. ABILITY BAR & SKILLS */
    .ability-bar {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 20px auto;
        width: 95%;
        max-width: 450px;
    }

    .skill-container {
        position: relative;
        flex: 1;
        overflow: hidden;
        border-radius: 12px;
        height: 70px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .skill-btn {
        width: 100%;
        height: 100%;
        background: #16213e;    
        border: 2px solid #4ecca3; 
        color: #4ecca3;         
        font-size: 0.85em;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .skill-btn span {
        position: relative;
        z-index: 3; /* Keeps text above the dark tint */
        pointer-events: none;
    }

    .skill-btn:hover:not(:disabled) {
        background: #1f2d52;
        transform: translateY(-2px);
    }

    .skill-btn:disabled {
        border-color: #444;
        color: #666;
        cursor: not-allowed;
        opacity: 0.7;
    }

    .cooldown-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 0%; 
        background: rgba(0, 0, 0, 0.75); 
        pointer-events: none; 
        z-index: 2;
        border-radius: 10px;
    }

    /* 4. SHOP & UPGRADE CARDS */
    .shop-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        max-height: 60vh; 
        overflow-y: auto; 
        padding: 15px;
    }

    .upgrade-card { 
        background: #16213e; 
        border: 2px solid #4ecca3; 
        padding: 15px; 
        width: 90%; 
        max-width: 420px; 
        border-radius: 15px; /* Rounded corners restored */
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.2s;
    }

    .upgrade-card:hover {
        transform: translateX(5px);
        background: #1f2d52;
    }

    /* 5. NAVIGATION */
    .nav-btn {
        background-color: #1a1a2e;
        color: #4ecca3;
        border: 2px solid #4ecca3;
        padding: 10px 25px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin: 5px;
    }

    .nav-btn.active {
        background-color: #4ecca3;
        color: #1a1a2e;
        box-shadow: 0 0 15px #4ecca3;
    }

    /* 6. ANIMATIONS & SPECIAL EFFECTS */
    
    /* Monster Hit Flash */
    .monster-pulse { animation: hitFlash 0.15s ease-out; }
    @keyframes hitFlash {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.1); filter: brightness(2) drop-shadow(0 0 15px #e94560); }
        100% { transform: scale(1); filter: brightness(1); }
    }

    /* Mana Storm Multi-hit */
    .monster-storm-hit { animation: stormFlash 0.1s infinite; }
    @keyframes stormFlash {
        0% { filter: brightness(1); }
        50% { filter: brightness(2.5) drop-shadow(0 0 25px #bb86fc); }
        100% { filter: brightness(1); }
    }

    /* Screen Shake */
    .shake { animation: shakeEffect 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shakeEffect {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    /* Ready Glow for Skills */
    .skill-btn:not(:disabled) {
        animation: glowReady 2s infinite;
    }
    @keyframes glowReady {
        0% { box-shadow: 0 0 5px rgba(78, 204, 163, 0.2); }
        50% { box-shadow: 0 0 15px rgba(78, 204, 163, 0.6); }
        100% { box-shadow: 0 0 5px rgba(78, 204, 163, 0.2); }
    }

    /* Floating Text Popups */
    .damage-popup { 
        position: absolute; 
        font-weight: bold; 
        pointer-events: none; 
        animation: popupFloat 0.8s ease-out forwards; 
        z-index: 100; 
    }
    @keyframes popupFloat { 
        0% { opacity: 1; transform: translateY(0) scale(1); } 
        100% { opacity: 0; transform: translateY(-60px) scale(1.2); } 
    }
</style>
</head>
<body>

    <h1>Mana Sanctum</h1>

    <div id="stats-dashboard" style="background: #16213e; border: 1px solid #4ecca3; padding: 10px; border-radius: 8px; width: 250px; margin: 10px auto;">
        <div style="font-size: 0.7em; color: #4ecca3; text-transform: uppercase;">Arcane Flow</div>
        <div id="total-mps-display">0 Mana/sec</div>
    </div>
    
    <div class="nav-bar" style="margin-top: 20px;">
        <button id="sanctum-btn" onclick="showTab('sanctum')" class="nav-btn active">Sanctum</button>
        <button id="battle-btn" onclick="showTab('battle')" class="nav-btn">Battle Rift</button>
		<button id="compendium-btn" onclick="showTab('compendium')" class="nav-btn">Compendium</button>
		<button id="settings-btn" class="nav-btn" onclick="showTab('settings')">Settings</button>
    </div>

    <div id="sanctum-tab" class="tab-content">
        <div id="mana-display">Mana: 0</div>
        <button onclick="clickMana(event)" style="width: 200px; height: 60px; margin-bottom: 20px;">Gather Mana</button>
        <div class="shop-container" id="shop"></div>
    </div>

    <div id="battle-tab" class="tab-content" style="display: none;">
        <div id="combat-section">
            <h2 style="color: #e94560; margin: 0;">Arcane Rift</h2>
            <div id="monster-container" style="height: 120px; display: flex; align-items: center; justify-content: center; position: relative;">
                <div id="monster-sprite" class="monster-pulse" onclick="attackMonster()">👿</div>
            </div>
            <div id="monster-name" style="font-weight: bold;">Shadow Imp</div>
            <div style="color: #4ecca3;">Essence: <span id="essence-display">0</span></div>
            
            <div style="width: 100%; background: #0f3460; height: 20px; border-radius: 10px; margin: 10px 0; border: 1px solid #e94560; overflow: hidden; position: relative;">
                <div id="hp-bar" style="width: 100%; background: #e94560; height: 100%; transition: width 0.1s;"></div>
                <div id="hp-text" style="position: absolute; width: 100%; text-align: center; font-size: 0.8em; line-height: 20px; color: white; font-weight: bold;">HP: 50 / 50</div>
            </div>

            <button onclick="attackMonster()" id="attack-btn" style="background: #e94560; color: white; width: 100%; margin-top: 10px; font-weight: bold;">
                Standard Strike (10 Mana)
            </button>

            <div class="ability-bar" style="display: flex; gap: 8px; justify-content: center; margin-top: 15px;">
    <div class="skill-container">
        <button id="skill-blast" class="skill-btn" onclick="castBlast()">
            Arcane Blast<br><small>50 Mana</small>
        </button>
        <div id="cooldown-blast" class="cooldown-overlay"></div>
    </div>

    <div class="skill-container">
    <button id="skill-siphon" class="skill-btn" onclick="castSiphon()">
        <span style="position: relative; z-index: 2;">Siphon<br><small>200 Mana</small></span>
        <div id="cooldown-siphon" class="cooldown-overlay"></div>
    </button>
</div>

    <div class="skill-container">
        <button id="skill-storm" class="skill-btn" onclick="castStorm()">
            Mana Storm<br><small>1k Mana</small>
        </button>
        <div id="cooldown-storm" class="cooldown-overlay"></div>
    </div>
</div>
        </div>

        <div id="artifact-vault">
            <h3 style="color: #4ecca3;">Arcane Upgrades</h3>
            <div id="artifact-list" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;"></div>
        </div>
    </div> 

    <div id="compendium-tab" class="tab-content" style="display: none; padding: 20px;">
        <h2 style="color: #4ecca3;">Mystic Compendium</h2>
        <div id="compendium-list" class="shop-container"></div>
    </div>

	<div id="settings-tab" class="tab-content" style="display: none; padding: 20px;">
    <h2 style="color: #fca311;">Game Settings</h2>
    
    <div style="background: #16213e; padding: 15px; border-radius: 8px; border: 1px solid #444;">
        <h3 style="margin-top: 0; color: #4ecca3;">Data Transfer</h3>
        <p style="font-size: 0.8em; color: #ccc;">Use these codes to move your save between browsers or test the Beta branch.</p>
        
        <button onclick="exportSave()" style="background: #4ecca3; color: #1b1b2f; width: 100%; margin-bottom: 10px; font-weight: bold;">
            Export Save Code
        </button>
        
        <textarea id="save-box" placeholder="Paste save code here..." 
            style="width: 100%; height: 80px; background: #0f3460; color: #fff; border: 1px solid #4ecca3; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 0.8em;">
        </textarea>
        
        <button onclick="importSave()" style="background: #fca311; color: #1b1b2f; width: 100%; margin-top: 10px; font-weight: bold;">
            Import Save Code
        </button>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <button onclick="deleteSave()" style="background: #e94560; color: white; padding: 5px 15px; font-size: 0.8em; opacity: 0.6;">
            Hard Reset Game
        </button>
    </div>
</div>

    <div id="admin-menu" style="display: none; position: fixed; bottom: 20px; right: 20px; background: #222; border: 2px solid #ff0055; padding: 20px; border-radius: 10px; z-index: 99999; text-align: left; box-shadow: 0 0 20px #000;">
        <h3 style="color: #ff0055; margin: 0 0 10px 0;">Arcane Debugger</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button onclick="cheatMana()">+1 Million Mana</button>
            <button onclick="cheatEssence()">+100 Essence</button>
            <button onclick="instaKill()">Insta-Kill</button>
            <button onclick="unlockAllArtifacts()">Unlock All</button>
            <button onclick="deleteSave()" style="background: #e94560;">Wipe Progress</button>
        </div>
    </div>

  <script>
// --- 1. CORE VARIABLES ---
let mana = 0;
let essence = 0;
let globalMPS = 0;
let monsterHP = 50;
let monsterMaxHP = 50;
let monstersDefeated = 0;
let passiveDamageBuffer = 0;
let passiveTimer = 0;
let baseTickSpeed = 100;
let killsSinceLastArtifact = 0;
let manaPerKill = 5;
let isCurrentMonsterElite = false;
	  
const PITY_THRESHOLD = 20; 

const artifactPool = [
    { id: "wand", name: "Ancient Wand", icon: "🪄", owned: false, level: 1, bonus: 2, type: "damage", desc: "Increases Click & Blast damage." },
    { id: "robe", name: "Scholar's Robe", icon: "🥋", owned: false, level: 1, bonus: 0.1, type: "discount", desc: "10% discount on upgrades." },
    { id: "orb", name: "Crystal Ball", icon: "🔮", owned: false, level: 1, bonus: 0.25, type: "mps", desc: "Increases Global MPS by 25%." },
    { id: "hourglass", name: "Temporal Hourglass", icon: "⏳", owned: false, level: 1, bonus: 0.05, type: "speed", desc: "Makes the game tick 5% faster." },
    { id: "pouch", name: "Bottomless Pouch", icon: "💰", owned: false, level: 1, bonus: 1.2, type: "essence", desc: "Monsters drop 20% more Essence." },
    { id: "slayer", name: "Slayer's Mark", icon: "🎯", owned: false, level: 1, bonus: 2, type: "elite_damage", desc: "Deals massive bonus damage to Elite monsters." }
];

const upgrades = [
    { id: 'scribe', name: 'Apprentice Scribe', cost: 10, mps: 1, count: 0 },
    { id: 'well', name: 'Mana Well', cost: 100, mps: 8, count: 0 },
    { id: 'library', name: 'Arcane Library', cost: 1000, mps: 45, count: 0 },
    { id: 'tower', name: 'Wizard Tower', cost: 4000, mps: 100, count: 0 },
    { id: 'ball', name: 'Palantir', cost: 7500, mps: 300, count: 0 }
];

// --- 2. NAVIGATION LOGIC ---
window.showTab = function(tabName) {
    // 1. Add 'settings' to this list so the game knows it exists
    const tabs = ['sanctum', 'battle', 'compendium', 'settings']; 
    
    tabs.forEach(t => {
        const content = document.getElementById(t + '-tab');
        const btn = document.getElementById(t + '-btn');
        if (content) content.style.display = 'none';
        if (btn) btn.classList.remove('active');
    });

    // 2. Show the active tab
    const activeTab = document.getElementById(tabName + '-tab');
    if (activeTab) {
        activeTab.style.display = 'block';
        console.log("Showing tab: " + tabName);
    }
    
    // 3. Highlight the active button
    const activeBtn = document.getElementById(tabName + '-btn');
    if (activeBtn) activeBtn.classList.add('active');

    // 4. Trigger specific renders so the data is fresh
    if (tabName === 'sanctum') renderShop();
    if (tabName === 'battle') {
        renderArtifacts();
        updateUI();
    }
    if (tabName === 'compendium') {
        renderCompendium();
    }
    // No specific render needed for settings, it's just static buttons!
};

// --- 3. SHOP & ECONOMY ---
function getAffordableAmount(upg, currentMana) {
    let count = 0;
    let tempMana = currentMana;
    let tempCost = upg.cost;
    
    const discount = getArtifactBonus("robe");

    // We simulate buying until we run out of mana
    while (true) {
        let actualCost = Math.floor(tempCost * (1 - discount));
        if (tempMana >= actualCost) {
            tempMana -= actualCost;
            tempCost = Math.floor(tempCost * 1.15);
            count++;
        } else {
            break;
        }
    }
    return count;
}

function renderShop() {
    const shop = document.getElementById('shop');
    if (!shop) return;
    
    let html = "";
    upgrades.forEach((upg, index) => {
        const robe = artifactPool.find(a => a.id === 'robe');
        const discount = (robe && robe.owned) ? 0.9 : 1;
        const currentCost = Math.floor(upg.cost * discount);
        const affordable = getAffordableAmount(upg, mana);

        html += `
            <div class="upgrade-card">
                <div class="info">
                    <strong>${upg.name}</strong> <br>
                    <small>Level: ${upg.count}</small><br>
                    <small style="color: #4ecca3">+${upg.mps} Mana/sec</small>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <button id="btn-${index}" onclick="buyUpgrade(${index})">
                        Buy: ${currentCost.toLocaleString()}
                    </button>
                    
                    <button id="max-${index}" onclick="buyMax(${index})" 
                            style="background: #0f3460; font-size: 0.7em; color: white;">
                        Max (+${affordable})
                    </button>
                </div>
            </div>`;
    });
    shop.innerHTML = html;
}

function buyUpgrade(index) {
    const upg = upgrades[index];
    
    // Robe Logic: Apply discount to the cost before checking mana
    const discount = getArtifactBonus("robe"); 
    const finalCost = Math.floor(upg.cost * (1 - discount));

    if (mana >= finalCost) {
        mana -= finalCost;
        upg.count++;
        
        // Increase base cost for next time (Standard 1.15x scaling)
        upg.cost = Math.floor(upg.cost * 1.15); 
        
        // Restore Global MPS calculation if this was a production upgrade
        globalMPS += upg.mps; 

        updateUI();
        if (typeof saveGame === 'function') saveGame();
    } else {
        // Optional: Flash the button red if you want feedback here
        console.log("Insufficient Mana for " + upg.name);
    }
}

function buyMax(index) {
    const upg = upgrades[index];
    const robe = artifactPool.find(a => a.id === 'robe');
    const discount = (robe && robe.owned) ? 0.9 : 1;
    let count = 0;
    while (mana >= Math.floor(upg.cost * discount)) {
        mana -= Math.floor(upg.cost * discount);
        upg.count++;
        upg.cost = Math.floor(upg.cost * 1.15);
        count++;
    }
    if (count > 0) {
        calculateMPS();
        updateUI();
        renderShop();
        saveGame();
    }
}

function calculateMPS() {
    let baseMPS = upgrades.reduce((total, upg) => total + (upg.count * upg.mps), 0);
    const orb = artifactPool.find(a => a.id === 'orb');
    let orbMult = (orb && orb.owned) ? (1 + (orb.level * 0.25)) : 1;
    globalMPS = baseMPS * orbMult;
}

// --- 4. COMBAT & ARTIFACTS ---
function attackMonster() {
    // 1. CONSTANTS - Matches your HTML
    const attackCost = 10; 
    const log = document.getElementById('battle-log');
    const sprite = document.getElementById('monster-sprite');

    // 2. MANA REQUIREMENT CHECK
    if (mana < attackCost) {
        if (log) {
            log.innerText = "Insufficient Mana! Wait for your pool to replenish.";
            log.style.color = "#ff4d4d"; // Temporary red warning
        }
        return; 
    }

    // 3. DAMAGE CALCULATION
    // Base damage (1) + Ancient Wand bonus (e.g., +2 per level)
    let damage = 1 + getArtifactBonus("wand"); 

    // Slayer's Mark Multiplier (Only applies to Elites)
    if (isCurrentMonsterElite) {
        const slayerBonus = getArtifactBonus("slayer"); 
        damage *= (1 + slayerBonus); 
    }

    // 4. EXECUTE ATTACK
    mana -= attackCost;
    monsterHP -= damage;

    // 5. VISUAL FEEDBACK (The Pulse)
    if (sprite) {
        sprite.classList.remove('monster-pulse'); // Reset animation
        void sprite.offsetWidth;                // Trigger reflow
        sprite.classList.add('monster-pulse');    // Restart animation
    }

    // 6. DEATH CHECK OR UI REFRESH
    if (monsterHP <= 0) {
        monsterHP = 0; // Safety for the HP Bar width
        defeatMonster();
    } else {
        // We call updateUI to refresh Mana and the HP Bar immediately
        updateUI();
        
        // Optional: Update the battle log with damage dealt
        if (log) {
            log.style.color = isCurrentMonsterElite ? "#f1c40f" : "#fff";
            log.innerText = `Struck ${isCurrentMonsterElite ? "Elite" : "Monster"} for ${Math.floor(damage).toLocaleString()} damage!`;
        }
    }
}

// --- NEW ATTACK ABILITIES ---

function castBlast() {
    const cost = 50; 
    const cooldownMs = 5000; // 5 second cooldown
    const log = document.getElementById('battle-log');
    const btn = document.getElementById('skill-blast');

    // 1. Check Mana and Cooldown State
    if (mana < cost) {
        if (log) log.innerText = "Need 50 Mana for Arcane Blast!";
        return;
    }
    if (btn.disabled) return;

    // 2. Spend Mana and Trigger Cooldown
    mana -= cost;
    triggerCooldown('skill-blast', cooldownMs);

    // 3. Calculate Damage
    // Base 20 damage + scaling with Ancient Wand
    let damage = 20 + (getArtifactBonus("wand") * 5);
    
    // Apply Slayer's Mark if fighting an Elite
    if (isCurrentMonsterElite) {
        damage *= (1 + getArtifactBonus("slayer"));
    }

    // 4. Apply Damage and Visuals
    monsterHP -= damage;

    const sprite = document.getElementById('monster-sprite');
    if (sprite) {
        sprite.style.filter = "brightness(2) contrast(2) hue-rotate(180deg)";
        setTimeout(() => { 
            sprite.style.filter = isCurrentMonsterElite ? "drop-shadow(0 0 15px #f1c40f)" : "none"; 
        }, 150);
    }

    if (log) {
        log.style.color = "#4ecca3";
        log.innerText = `ARCANE BLAST! Dealt ${Math.floor(damage).toLocaleString()} damage!`;
    }

    // 5. Final Sync
    if (monsterHP <= 0) {
        monsterHP = 0;
        defeatMonster();
    } else {
        updateUI();
    }
}

function castSiphon() {
    const cost = 200; // Matches your HTML <small>200 Mana</small>
    const cooldownMs = 15000; // 15 second cooldown
    const log = document.getElementById('battle-log');
    const btn = document.getElementById('skill-siphon');

    // 1. MANA & COOLDOWN CHECK
    if (mana < cost) {
        if (log) log.innerText = "Insufficient Mana for Siphon!";
        return;
    }
    if (btn.disabled) return;

    // 2. SPEND MANA & TRIGGER COOLDOWN
    mana -= cost;
    triggerCooldown('skill-siphon', cooldownMs);

    // 3. DAMAGE CALCULATION
    // Base 50 damage + scaling with Ancient Wand
    let damage = 50 + (getArtifactBonus("wand") * 10);
    
    // Apply Slayer's Mark bonus if fighting an Elite
    if (isCurrentMonsterElite) {
        damage *= (1 + getArtifactBonus("slayer"));
    }

    // 4. THE SIPHON MECHANIC (MANA RECOVERY)
    // Recover 50% of the damage dealt as Mana
    const manaRecovered = Math.floor(damage * 0.5);
    mana += manaRecovered;

    // 5. VISUAL FEEDBACK
    const sprite = document.getElementById('monster-sprite');
    if (sprite) {
        // Deep teal/green "leech" effect
        sprite.style.filter = "brightness(0.5) sepia(1) hue-rotate(120deg) saturate(3)";
        setTimeout(() => { 
            sprite.style.filter = isCurrentMonsterElite ? "drop-shadow(0 0 15px #f1c40f)" : "none"; 
        }, 300);
    }

    if (log) {
        log.style.color = "#4ecca3"; // Emerald green for healing/recovery
        log.innerText = `MANA SIPHON! Dealt ${Math.floor(damage).toLocaleString()} damage and recovered ${manaRecovered.toLocaleString()} Mana!`;
    }

    // 6. APPLY DAMAGE & SYNC
    monsterHP -= damage;

    if (monsterHP <= 0) {
        monsterHP = 0;
        defeatMonster();
    } else {
        updateUI();
    }
}

function castStorm() {
    const cost = 1000;
    const cooldownMs = 30000; // 30 second cooldown
    const log = document.getElementById('battle-log');
    const btn = document.getElementById('skill-storm');

    // 1. Check Mana and Cooldown State
    if (mana < cost) {
        if (log) log.innerText = "Need 1,000 Mana for Mana Storm!";
        return;
    }
    if (btn.disabled) return;

    // 2. Spend Mana and Trigger Cooldown
    mana -= cost;
    triggerCooldown('skill-storm', cooldownMs);

    // 3. Multi-Hit Configuration
    const totalTicks = 10;
    const duration = 2000; // 2 seconds
    const tickRate = duration / totalTicks;
    
    // Total Damage: 500 base + 10% of current mana
    const totalBaseDamage = 500 + (mana * 0.10);
    const damagePerTick = totalBaseDamage / totalTicks;

    let ticksProcessed = 0;

    if (log) {
        log.style.color = "#bb86fc";
        log.innerText = "The Rift trembles... MANA STORM!";
    }

    // 4. The Multi-Hit Interval
    const stormInterval = setInterval(() => {
        let currentTickDamage = damagePerTick;
        
        // Apply Slayer's Mark bonus for every tick against Elites
        if (isCurrentMonsterElite) {
            currentTickDamage *= (1 + getArtifactBonus("slayer"));
        }

        monsterHP -= currentTickDamage;
        ticksProcessed++;

        // Visual "Electric" flickering
        const sprite = document.getElementById('monster-sprite');
        if (sprite) {
            sprite.style.filter = "brightness(1.5) sepia(1) hue-rotate(280deg)";
            setTimeout(() => { 
                sprite.style.filter = isCurrentMonsterElite ? "drop-shadow(0 0 15px #f1c40f)" : "none"; 
            }, 50);
        }

        // Check for monster death or interval completion
        if (monsterHP <= 0) {
            monsterHP = 0;
            clearInterval(stormInterval);
            defeatMonster();
        } else if (ticksProcessed >= totalTicks) {
            clearInterval(stormInterval);
        }

        updateUI(); // Refresh HP bar and numbers each tick
    }, tickRate);
}

function triggerCooldown(skillId, ms) {
    const btn = document.getElementById(skillId);
    // Get the overlay ID (e.g., 'skill-blast' -> 'cooldown-blast')
    const overlayId = skillId.replace('skill-', 'cooldown-');
    const overlay = document.getElementById(overlayId);
    
    if (!btn || !overlay) return;

    // 1. Lock the button and reset the overlay
    btn.disabled = true;
    overlay.style.transition = "none"; 
    overlay.style.height = "100%";     

    // 2. Start the CSS animation
    setTimeout(() => {
        overlay.style.transition = `height ${ms}ms linear`;
        overlay.style.height = "0%"; 
    }, 50);

    // 3. Re-enable and Sync UI when finished
    setTimeout(() => {
        btn.disabled = false;
        
        // CRITICAL: Refresh the UI state. 
        // This ensures the button's opacity/color resets correctly based on current mana.
        updateUI(); 
        
        console.log(`${skillId} is ready again!`);
    }, ms);
}
	  
function defeatMonster() {
    // 1. MONSTER DATA
    const monsters = [
        { name: "Shadow Imp", icon: "👿" },
        { name: "Void Wraith", icon: "👻" },
        { name: "Chaos Golem", icon: "🗿" },
        { name: "Abyssal Drake", icon: "🐲" }
    ];

    // 2. CALCULATE REWARDS FOR THE DEFEATED MONSTER
    // (We use the 'isCurrentMonsterElite' flag set from the PREVIOUS round)
    const eliteMult = isCurrentMonsterElite ? 3 : 1;
    const wandBonus = getArtifactBonus("wand");
    
    // Base Mana + Wand Bonus, scaled by total kills, then tripled if Elite
    manaPerKill = Math.floor((5 + wandBonus) * (1 + monstersDefeated * 0.1)) * eliteMult;
    
    // Essence logic + Pouch bonus, tripled if Elite
    const pouchBonus = getArtifactBonus("pouch") || 1; 
    const essenceGained = Math.floor(1 * pouchBonus) * eliteMult;

    // 3. APPLY REWARDS
    mana += manaPerKill;
    essence += essenceGained;
    monstersDefeated++;

    // 4. ARTIFACT DROP LOGIC (With Pity Timer)
    killsSinceLastArtifact++;
    // Elites have a 20% drop chance, Normals have 10%
    const dropChance = isCurrentMonsterElite ? 0.20 : 0.10; 
    
    if (Math.random() < dropChance || killsSinceLastArtifact >= 20) {
        if (typeof gainRandomArtifact === 'function') gainRandomArtifact();
        killsSinceLastArtifact = 0; // Reset pity timer
    }

    // 5. ROLL FOR NEXT MONSTER STATUS
    // This sets the flag for the monster that is about to appear
    isCurrentMonsterElite = Math.random() < 0.10; 
    const nextEliteMult = isCurrentMonsterElite ? 3 : 1;

    // 6. SCALE STATS FOR NEXT MONSTER
    // Uses exponential scaling so health doesn't stay flat
    monsterMaxHP = Math.floor(50 * Math.pow(1.12, monstersDefeated)) * nextEliteMult;
    monsterHP = monsterMaxHP;

    // 7. UI VISUALS
    const roll = monsters[Math.floor(Math.random() * monsters.length)];
    const nameEl = document.getElementById('monster-name');
    const spriteEl = document.getElementById('monster-sprite');
    const log = document.getElementById('battle-log');
    
    if (nameEl) {
        nameEl.innerText = isCurrentMonsterElite ? "✨ ELITE " + roll.name : roll.name;
        nameEl.style.color = isCurrentMonsterElite ? "#f1c40f" : "#fff";
    }
    
    if (spriteEl) {
        spriteEl.innerText = roll.icon;
        spriteEl.style.transform = isCurrentMonsterElite ? "scale(1.4)" : "scale(1.0)";
        spriteEl.style.filter = isCurrentMonsterElite ? "drop-shadow(0 0 15px #f1c40f)" : "none";
    }

    if (log) {
        log.style.color = isCurrentMonsterElite ? "#f1c40f" : "#fff";
        log.innerText = `Victory! +${manaPerKill.toLocaleString()} Mana, +${essenceGained} Ess.`;
    }

    // 8. FINAL SYNC
    updateUI();
    if (typeof saveGame === 'function') saveGame();
}

function gainRandomArtifact() {
    // 1. Filter for artifacts the player DOES NOT own yet
    const unowned = artifactPool.filter(art => !art.owned);

    // 2. If there are no artifacts left to find, exit
    if (unowned.length === 0) {
        console.log("All artifacts have been recovered from the Rift!");
        return;
    }

    // 3. Select a random artifact from the unowned list
    const randomIndex = Math.floor(Math.random() * unowned.length);
    const newArtifact = unowned[randomIndex];

    // 4. Mark as owned
    newArtifact.owned = true;
    newArtifact.level = 1; // Ensure it starts at level 1

    // 5. Reset the Pity Timer
    killsSinceLastArtifact = 0;

    // 6. Visual Feedback & Logging
    const log = document.getElementById('battle-log');
    if (log) {
        log.innerHTML = `<span style="color: #f1c40f; font-weight: bold;">✨ DISCOVERY: You found the ${newArtifact.name}! ✨</span>`;
    }

    // 7. CRITICAL: Update every relevant system
    // We recalculate MPS because the new artifact might be the Crystal Ball
    if (typeof calculateMPS === 'function') calculateMPS();
    
    // We re-render the artifact list to show the new card
    renderArtifacts();
    
    // We update the UI to refresh mana prices (in case it's the Scholar's Robe)
    updateUI();
    
    // Save the new state immediately
    if (typeof saveGame === 'function') saveGame();
}

function upgradeArtifact(id) {
    const art = artifactPool.find(a => a.id === id);
    
    // 1. SAFETY CHECKS
    if (!art || !art.owned) return;

    // 2. EXPONENTIAL COST CALCULATION
    const upgCost = Math.floor(5 * Math.pow(1.5, art.level - 1));

    // 3. AFFORDABILITY CHECK
    if (essence < upgCost) {
        console.log(`Insufficient Essence! Need ${upgCost}.`);
        return;
    }

    // 4. EXECUTE UPGRADE
    essence -= upgCost;
    art.level++;
    
    // 5. SCALE BONUSES (Specific to each artifact type)
    switch(id) {
        case 'wand':
            art.bonus += 1; // +1 Base Mana/Damage per level
            break;
        case 'pouch':
            art.bonus += 0.2; // +20% Essence drop per level
            break;
        case 'orb':
            art.bonus += 0.05; // +5% Global MPS per level
            break;
        case 'hourglass':
            art.bonus += 0.01; // +1% Game Speed per level
            break;
        case 'slayer':
            art.bonus += 1.0; // +100% Elite Damage per level
            break;
        case 'robe':
            // Cap discount at 90% to prevent items becoming free or negative
            if (art.bonus < 0.90) art.bonus += 0.02; 
            break;
        default:
            art.bonus += 0.05; // Fallback for new artifacts
    }

    // 6. RE-CALCULATE AND RE-DRAW
    // Ensure the MPS is updated before the UI draws the new number
    if (typeof calculateMPS === 'function') calculateMPS();
    
    updateUI();        // Refreshes the top bar and shop buttons
    renderArtifacts(); // Refreshes the artifact cards with new costs/stats
    
    if (typeof saveGame === 'function') saveGame();
}
function getArtifactBonus(id) {
    const art = artifactPool.find(a => a.id === id);
    return (art && art.owned) ? art.bonus : 0;
}

// --- 6. CORE ENGINE ---
function gameLoop() {
    const hourglass = artifactPool.find(a => a.id === 'hourglass');
    let speedMult = (hourglass && hourglass.owned) ? (1 - (hourglass.level * 0.05)) : 1;
    let tickDelay = Math.max(20, baseTickSpeed * speedMult);

    mana += (globalMPS / 10);
    if (monsterHP > 0) {
        let pDmg = (globalMPS * 0.01);
        monsterHP -= pDmg;
        passiveDamageBuffer += pDmg;
        if (monsterHP <= 0) defeatMonster();
    }

	if (Math.random() < 0.01) { // Roughly every 10 seconds at 100ms ticks
    saveGame();
	}
	
    passiveTimer++;
    if (passiveTimer >= 10) {
        if (passiveDamageBuffer >= 1) createDamagePopup(Math.ceil(passiveDamageBuffer), true);
        passiveDamageBuffer = 0;
        passiveTimer = 0;
    }
    updateUI();
    updateCombatUI();
    setTimeout(gameLoop, tickDelay);
}

function updateUI() {
    // 1. TOP BAR - Resources and the Crystal Ball (MPS) Bonus
    const mpsEl = document.getElementById('total-mps-display');
    const manaEl = document.getElementById('mana-display');
    const essenceEl = document.getElementById('essence-display');

    // Calculate boosted MPS for display
    const orbBonus = getArtifactBonus("orb"); // 0.25 if owned
    const displayMPS = globalMPS * (1 + orbBonus);

    if (mpsEl) mpsEl.innerText = `${Math.floor(displayMPS).toLocaleString()} Mana/sec`;
    if (manaEl) manaEl.innerText = `Mana: ${Math.floor(mana).toLocaleString()}`;
    if (essenceEl) essenceEl.innerText = essence;

    // 2. SKILLS - Check affordability
    const skills = [
        { id: 'skill-blast', cost: 50 },
        { id: 'skill-siphon', cost: 200 },
        { id: 'skill-storm', cost: 1000 }
    ];

    skills.forEach(skill => {
        const btn = document.getElementById(skill.id);
        if (btn && !btn.disabled) { 
            btn.style.opacity = (mana < skill.cost) ? "0.5" : "1";
        }
    });

    // 3. SHOP BUTTONS - Scholar's Robe Discount & Affordability
    upgrades.forEach((upg, i) => {
        const btn = document.getElementById(`btn-${i}`);
        const maxBtn = document.getElementById(`max-${i}`);
        
        if (btn || maxBtn) {
            // Use the Artifact Helper for the Robe discount
            const discount = getArtifactBonus("robe"); // 0.1 if owned
            const currentCost = Math.floor(upg.cost * (1 - discount));
            
            // Note: getAffordableAmount should also account for the discount internally
            const affordable = getAffordableAmount(upg, mana);

            if (btn) {
                btn.disabled = (mana < currentCost);
                btn.style.backgroundColor = (mana < currentCost) ? "#16213e" : "#4ecca3";
                btn.style.color = (mana < currentCost) ? "#555" : "#1b1b2f";
            }

            if (maxBtn) {
                maxBtn.disabled = (affordable === 0);
                maxBtn.innerText = `Max (+${affordable})`;
                maxBtn.style.opacity = (affordable === 0) ? "0.4" : "1";
            }
        }
    });

    // 4. ARTIFACT UPGRADES - Essence Costs
    artifactPool.forEach(art => {
        if (art.owned) {
            const artBtn = document.getElementById(`art-up-${art.id}`);
            if (artBtn) {
                const upgCost = Math.floor(5 * Math.pow(1.5, art.level - 1));
                artBtn.innerText = `Up (${upgCost} Ess)`;
                
                if (essence >= upgCost) {
                    artBtn.disabled = false;
                    artBtn.style.backgroundColor = "#4ecca3"; 
                    artBtn.style.color = "#1b1b2f";
                    artBtn.style.boxShadow = "0 0 10px rgba(78, 204, 163, 0.4)";
                } else {
                    artBtn.disabled = true;
                    artBtn.style.backgroundColor = "#16213e"; 
                    artBtn.style.color = "#555";
                    artBtn.style.boxShadow = "none";
                }
            }
        }
    });
	renderArtifacts();
    // 5. COMBAT - Externalized Combat UI
    if (typeof updateCombatUI === 'function') {
        updateCombatUI();
    }
}

function updateCombatUI() {
    const pct = Math.max(0, (monsterHP / monsterMaxHP) * 100);
    document.getElementById('hp-bar').style.width = pct + "%";
    document.getElementById('hp-text').innerText = `HP: ${Math.ceil(monsterHP)} / ${monsterMaxHP}`;

// --- 7. SAVE SYSTEM ---
function saveGame() {
    try {
        const state = {
            mana: Number(mana),
            essence: Number(essence),
            monstersDefeated: Number(monstersDefeated),
            monsterMaxHP: Number(monsterMaxHP),
            killsSinceLastArtifact: killsSinceLastArtifact,
			// Map upgrades to a simple array of counts/costs
            upgrades: upgrades.map(u => ({ count: u.count, cost: u.cost })),
            // Map artifacts to their owned status and levels
            artifacts: artifactPool.map(a => ({ id: a.id, owned: a.owned, level: a.level }))
        };
        localStorage.setItem("wizardIdle_v1", JSON.stringify(state));
        console.log("Game Saved Successfully");
    } catch (e) {
        console.error("Save Error:", e);
    }
}

function loadGame() {
    try {
        const saved = localStorage.getItem("wizardIdle_v1");
        if (!saved) return;

        const data = JSON.parse(saved);
        
        // Load basic resources
        mana = Number(data.mana) || 0;
        essence = Number(data.essence) || 0;
        monstersDefeated = Number(data.monstersDefeated) || 0;
        monsterMaxHP = Number(data.monsterMaxHP) || 50;
        monsterHP = monsterMaxHP; // Reset HP to full on load
		killsSinceLastArtifact = Number(data.killsSinceLastArtifact) || 0;
		
        // Load Upgrades
        if (data.upgrades) {
            data.upgrades.forEach((savedUpg, i) => {
                if (upgrades[i]) {
                    upgrades[i].count = savedUpg.count || 0;
                    upgrades[i].cost = savedUpg.cost || upgrades[i].cost;
                }
            });
        }

        // Load Artifacts
        if (data.artifacts) {
            data.artifacts.forEach(savedArt => {
                const art = artifactPool.find(a => a.id === savedArt.id);
                if (art) {
                    art.owned = savedArt.owned;
                    art.level = savedArt.level || 1;
                }
            });
        }
        
        console.log("Game Loaded Successfully");
    } catch (e) {
        console.error("Load Error:", e);
    }
}

	  function exportSave() {
    try {
        // 1. Package all current game variables into one object
        const saveState = {
            mana: typeof mana !== 'undefined' ? mana : 0,
            essence: typeof essence !== 'undefined' ? essence : 0,
            monstersDefeated: typeof monstersDefeated !== 'undefined' ? monstersDefeated : 0,
            monsterMaxHP: typeof monsterMaxHP !== 'undefined' ? monsterMaxHP : 50,
            killsSinceLastArtifact: killsSinceLastArtifact,
				
            // Map the upgrades to a clean array
            upgrades: upgrades.map(u => ({ 
                count: u.count, 
                cost: u.cost 
            })),
            
            // Map the artifacts to ensure we only save what's necessary
            artifacts: artifactPool.map(a => ({ 
                id: a.id, 
                owned: a.owned, 
                level: a.level || 1 
            })),
            
            // Add a timestamp so you know when the save was made
            timestamp: Date.now(),
            version: "1.0.0"
        };

        // 2. Convert object to JSON string, then to Base64
        const jsonStr = JSON.stringify(saveState);
        const encodedSave = btoa(jsonStr);

        // 3. Display the code in the textarea
        const saveBox = document.getElementById('save-box');
        if (saveBox) {
            saveBox.value = encodedSave;
            saveBox.focus();
            saveBox.select();
        }

        // 4. Attempt to copy to clipboard
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(encodedSave).then(() => {
                handleExportFeedback();
            }).catch(err => {
                // Fallback if Clipboard API fails
                document.execCommand('copy');
                handleExportFeedback();
            });
        } else {
            document.execCommand('copy');
            handleExportFeedback();
        }

    } catch (e) {
        console.error("Export Error:", e);
        alert("Wizard Council Error: Could not enchant save string.");
    }
}

// Helper function to show the user it worked
function handleExportFeedback() {
    const exportBtn = document.querySelector("button[onclick='exportSave()']");
    if (exportBtn) {
        const originalText = exportBtn.innerText;
        exportBtn.innerText = "✨ SAVED TO CLIPBOARD! ✨";
        exportBtn.style.background = "#4ecca3";
        
        setTimeout(() => {
            exportBtn.innerText = originalText;
            exportBtn.style.background = ""; // Returns to CSS default
        }, 2500);
    }
}

function importSave() {
    try {
        const saveBox = document.getElementById('save-box');
        const encodedData = saveBox.value.trim();

        if (!encodedData) {
            alert("The scroll is empty! Please paste a save code.");
            return;
        }

        // 1. Decode the Base64 string back into JSON
        const jsonStr = atob(encodedData);
        const saveState = JSON.parse(jsonStr);

        // 2. Restore core variables
        mana = saveState.mana || 0;
        essence = saveState.essence || 0;
        monstersDefeated = saveState.monstersDefeated || 0;
        monsterMaxHP = saveState.monsterMaxHP || 50;

        // 3. Restore the Artifact Pity Counter
        // The "|| 0" ensures it works even for saves from the older version
        killsSinceLastArtifact = saveState.killsSinceLastArtifact || 0;

        // 4. Restore Upgrades (Mapping back to the live array)
        if (saveState.upgrades) {
            saveState.upgrades.forEach((savedUp, index) => {
                if (upgrades[index]) {
                    upgrades[index].count = savedUp.count;
                    upgrades[index].cost = savedUp.cost;
                }
            });
        }

        // 5. Restore Artifacts
        if (saveState.artifacts) {
            saveState.artifacts.forEach(savedArt => {
                const realArt = artifactPool.find(a => a.id === savedArt.id);
                if (realArt) {
                    realArt.owned = savedArt.owned;
                    realArt.level = savedArt.level || 1;
                }
            });
        }

        // 6. Force a save to LocalStorage so progress persists
        const finalSave = JSON.stringify(saveState);
        localStorage.setItem("wizardIdle_save", finalSave);

        // 7. Refresh the UI and provide feedback
        alert("✨ Save Successfully Imported! ✨");
        
        // Reloading the page is the safest way to ensure all game 
        // loops and logic restart with the new data.
        location.reload();

    } catch (e) {
        console.error("Import Error:", e);
        alert("Failed to read the save code. It may be corrupted or from an incompatible version.");
    }
}

function instaKill() { monsterHP = 0; defeatMonster(); }
function unlockAllArtifacts() { artifactPool.forEach(a => a.owned = true); renderArtifacts(); renderCompendium(); }
function deleteSave() { 
    if (confirm("Are you sure? This will wipe ALL progress and restart the game.")) { 
        localStorage.removeItem("wizardIdle_v1"); // Must match the key in saveGame()
        location.reload(); 
    } 
}

window.addEventListener('keydown', (e) => {
    // Check for backtick (`) or Tilde (~)
    if (e.key === '`' || e.key === '~' || e.keyCode === 192) {
        e.preventDefault(); // Stop the character from being typed
        const menu = document.getElementById('admin-menu');
        if (menu) {
            const isHidden = menu.style.display === 'none';
            menu.style.display = isHidden ? 'block' : 'none';
            console.log("Admin menu toggled: " + menu.style.display);
        }
    }
});

// --- INITIALIZE ---
window.onload = function() {
    console.log("Game Initializing...");
    
    // 1. Force Load
    try {
        loadGame();
    } catch(e) {
        console.error("Failed to load save:", e);
    }

    // 2. Force UI Render
    calculateMPS();
    renderShop();
    renderArtifacts();
    renderCompendium(); // Draw it once at start
    
    // 3. Set default tab
    showTab('sanctum');
    
    // 4. Start Loop
    gameLoop();
    
    console.log("Initialization Complete.");
};
</script>
