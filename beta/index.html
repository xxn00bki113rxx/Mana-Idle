<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="theme-color" content="#1a1a2e">
    <title>Fantasy Idle: Tiered Magic</title>
    <style>
    /* 1. GLOBAL THEME & LAYOUT */
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: #1a1a2e; 
        color: #fff; 
        text-align: center; 
        margin: 0; 
        padding-bottom: 50px; 
        overflow-x: hidden; 
    }

    #mana-display { 
        font-size: 2.5em; 
        color: #4ecca3; 
        margin: 10px; 
        text-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
    }

    /* 2. COMBAT SECTION & MONSTER */
    #combat-section {
        width: 90%;
        max-width: 400px;
        background: #16213e;
        border: 2px solid #e94560;
        padding: 20px;
        border-radius: 20px; /* Highly rounded for modern feel */
        margin: 20px auto;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #monster-sprite { 
        font-size: clamp(60px, 18vw, 90px); 
        transition: transform 0.1s, filter 0.2s; 
        cursor: pointer; 
        display: inline-block;
        user-select: none;
        padding: 10px;
    }

    #monster-sprite:active {
        transform: scale(0.9); /* Tactile "squish" on click */
    }

    /* 3. ABILITY BAR & SKILLS */
    .ability-bar {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 20px auto;
        width: 95%;
        max-width: 450px;
    }

    .skill-container {
        position: relative;
        flex: 1;
        overflow: hidden;
        border-radius: 12px;
        height: 70px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .skill-btn {
        width: 100%;
        height: 100%;
        background: #16213e;    
        border: 2px solid #4ecca3; 
        color: #4ecca3;         
        font-size: 0.85em;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .skill-btn span {
        position: relative;
        z-index: 3; /* Keeps text above the dark tint */
        pointer-events: none;
    }

    .skill-btn:hover:not(:disabled) {
        background: #1f2d52;
        transform: translateY(-2px);
    }

    .skill-btn:disabled {
        border-color: #444;
        color: #666;
        cursor: not-allowed;
        opacity: 0.7;
    }

    .cooldown-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 0%; 
        background: rgba(0, 0, 0, 0.75); 
        pointer-events: none; 
        z-index: 2;
        border-radius: 10px;
    }

    /* 4. SHOP & UPGRADE CARDS */
    .shop-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        max-height: 60vh; 
        overflow-y: auto; 
        padding: 15px;
    }

    .upgrade-card { 
        background: #16213e; 
        border: 2px solid #4ecca3; 
        padding: 15px; 
        width: 90%; 
        max-width: 420px; 
        border-radius: 15px; /* Rounded corners restored */
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.2s;
    }

    .upgrade-card:hover {
        transform: translateX(5px);
        background: #1f2d52;
    }

	/* Apply this to both containers */
.shop-container, .artifact-grid {
    display: grid;
    /* This creates columns at least 150px wide, filling the space automatically */
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    padding: 10px;
    justify-content: center;
}

/* Ensure cards take up the full width of their grid cell */
.upgrade-card, .artifact-card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    background: #1b1b2f;
    border: 1px solid #4ecca3;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    /* Remove any fixed widths you had before so they flex */
    width: auto; 
}

	.shop-container, .artifact-grid {
    display: grid;
    /* This makes columns that shrink/grow between 160px and 1fr */
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 15px;
}

.upgrade-card, .artifact-card {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    transition: transform 0.2s;
}

.upgrade-card:hover {
    border-color: #4ecca3;
    transform: translateY(-2px);
}

    /* 5. NAVIGATION */
    .nav-btn {
        background-color: #1a1a2e;
        color: #4ecca3;
        border: 2px solid #4ecca3;
        padding: 10px 25px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin: 5px;
    }

    .nav-btn.active {
        background-color: #4ecca3;
        color: #1a1a2e;
        box-shadow: 0 0 15px #4ecca3;
    }

    /* 6. ANIMATIONS & SPECIAL EFFECTS */
    
    /* Monster Hit Flash */
    .monster-pulse { animation: hitFlash 0.15s ease-out; }
    @keyframes hitFlash {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.1); filter: brightness(2) drop-shadow(0 0 15px #e94560); }
        100% { transform: scale(1); filter: brightness(1); }
    }

    /* Mana Storm Multi-hit */
    .monster-storm-hit { animation: stormFlash 0.1s infinite; }
    @keyframes stormFlash {
        0% { filter: brightness(1); }
        50% { filter: brightness(2.5) drop-shadow(0 0 25px #bb86fc); }
        100% { filter: brightness(1); }
    }

    /* Screen Shake */
    .shake { animation: shakeEffect 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shakeEffect {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    /* Ready Glow for Skills */
    .skill-btn:not(:disabled) {
        animation: glowReady 2s infinite;
    }
    @keyframes glowReady {
        0% { box-shadow: 0 0 5px rgba(78, 204, 163, 0.2); }
        50% { box-shadow: 0 0 15px rgba(78, 204, 163, 0.6); }
        100% { box-shadow: 0 0 5px rgba(78, 204, 163, 0.2); }
    }

    /* Floating Text Popups */
    .damage-popup { 
        position: absolute; 
        font-weight: bold; 
        pointer-events: none; 
        animation: popupFloat 0.8s ease-out forwards; 
        z-index: 100; 
    }
    @keyframes popupFloat { 
        0% { opacity: 1; transform: translateY(0) scale(1); } 
        100% { opacity: 0; transform: translateY(-60px) scale(1.2); } 
    }

	

/* This targets the main action buttons (Gather, Strike, Buy) */
#gather-mana-btn, #strike-btn, .buy-btn {
    border-radius: 15px; /* Matches the rounded game UI */
    border: 2px solid #4ecca3;
    background: #16213e;
    color: #4ecca3;
    font-weight: bold;
    font-size: 1.1em;
    padding: 15px;
    width: 100%;
    max-width: 300px;
    margin: 10px auto;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: block;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Hover effects for the rectangles that are now rounded */
#gather-mana-btn:hover, #strike-btn:hover, .buy-btn:hover:not(:disabled) {
    transform: translateY(-3px) scale(1.02);
    background: #4ecca3;
    color: #1b1b2f;
    box-shadow: 0 8px 20px rgba(78, 204, 163, 0.4);
}

/* Specific styling for the Standard Strike to keep it "Combat Red" */
#strike-btn {
    border-color: #e94560;
    color: #e94560;
}

#strike-btn:hover {
    background: #e94560;
    color: #fff;
    box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4);
}

/* Ensure the disabled state also respects the rounded corners */
button:disabled, .buy-btn:disabled {
    border-color: #444 !important;
    color: #666 !important;
    background: #1a1a2e !important;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
}

button {
    border-radius: 12px !important;
    transition: all 0.2s ease;
}

.floating-text {
    position: fixed; /* Ensures it uses screen coordinates from the click */
    font-weight: bold;
    font-size: 1.8rem;
    color: #4ecca3;
    pointer-events: none;
    z-index: 10000;
    user-select: none;
    text-shadow: 0 0 10px rgba(0,0,0,1);
    /* We handle the initial position in JS, so we only animate the movement */
    animation: floatAndFade 0.8s ease-out forwards;
}

@keyframes floatAndFade {
    0% {
        opacity: 1;
        transform: translateY(0); /* Start at click point */
    }
    100% {
        opacity: 0;
        transform: translateY(-100px); /* Move straight up from click point */
    }
}
		
</style>
</head>
<body>

    <h1>Mana Sanctum</h1>

    <div id="stats-dashboard" style="background: #16213e; border: 1px solid #4ecca3; padding: 10px; border-radius: 8px; width: 250px; margin: 10px auto;">
        <div style="font-size: 0.7em; color: #4ecca3; text-transform: uppercase;">Arcane Flow</div>
        <div id="total-mps-display">0 Mana/sec</div>
    </div>
    
    <div class="nav-bar" style="margin-top: 20px;">
        <button id="sanctum-btn" onclick="showTab('sanctum')" class="nav-btn active">Sanctum</button>
        <button id="battle-btn" onclick="showTab('battle')" class="nav-btn">Battle Rift</button>
		<button id="compendium-btn" onclick="showTab('compendium')" class="nav-btn">Compendium</button>
		<button id="settings-btn" class="nav-btn" onclick="showTab('settings')">Settings</button>
    </div>

    <div id="sanctum-tab" class="tab-content">
        <div id="mana-display">Mana: 0</div>
        <button onclick="clickMana(event)" id="gather-mana-btn" style="width: 200px; height: 60px; margin-bottom: 20px;">Gather Mana</button>
        <div class="shop-container" id="sanctum-display"></div>
    </div>

    <div id="battle-tab" class="tab-content" style="display: none;">
        <div id="combat-section">
            <h2 style="color: #e94560; margin: 0;">Arcane Rift</h2>
            <div id="monster-container" style="height: 120px; display: flex; align-items: center; justify-content: center; position: relative;">
                <div id="monster-sprite" class="monster-pulse" onclick="attackMonster()">👿</div>
            </div>
            <div id="monster-name" style="font-weight: bold;">Shadow Imp</div>
            <div style="color: #4ecca3;">Essence: <span id="essence-display">0</span></div>
            
            <div style="width: 100%; background: #0f3460; height: 20px; border-radius: 10px; margin: 10px 0; border: 1px solid #e94560; overflow: hidden; position: relative;">
                <div id="hp-bar" style="width: 100%; background: #e94560; height: 100%; transition: width 0.1s;"></div>
                <div id="hp-text" style="position: absolute; width: 100%; text-align: center; font-size: 0.8em; line-height: 20px; color: white; font-weight: bold;">HP: 50 / 50</div>
            </div>

            <button id="strike-btn" onclick="attackMonster(event)">Standard Strike</button>

<div class="ability-bar">
    <div class="skill-container">
        <button class="skill-btn" onclick="castBlast(event)">Arcane Blast</button>
        <div id="cooldown-blast" class="cooldown-overlay"></div>
    </div>
    <div class="skill-container">
        <button class="skill-btn" onclick="castSiphon(event)">Mana Siphon</button>
        <div id="cooldown-siphon" class="cooldown-overlay"></div>
    </div>
    <div class="skill-container">
        <button class="skill-btn" onclick="castStorm(event)">Mana Storm</button>
        <div id="cooldown-storm" class="cooldown-overlay"></div>
    </div>
</div>
        </div>

        
    </div> 

    <div id="compendium-tab" class="tab-content" style="display: none; padding: 20px;">
        <h2 style="color: #4ecca3;">Mystic Compendium</h2>
        <div id="compendium-list" class="shop-container"></div>
    </div>

	<div id="settings-tab" class="tab-content" style="display: none; padding: 20px;">
    <h2 style="color: #fca311;">Game Settings</h2>
    
    <div style="background: #16213e; padding: 15px; border-radius: 8px; border: 1px solid #444;">
        <h3 style="margin-top: 0; color: #4ecca3;">Data Transfer</h3>
        <p style="font-size: 0.8em; color: #ccc;">Use these codes to move your save between browsers or test the Beta branch.</p>
        
        <button onclick="exportSave()" style="background: #4ecca3; color: #1b1b2f; width: 100%; margin-bottom: 10px; font-weight: bold;">
            Export Save Code
        </button>
        
        <textarea id="save-box" placeholder="Paste save code here..." 
            style="width: 100%; height: 80px; background: #0f3460; color: #fff; border: 1px solid #4ecca3; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 0.8em;">
        </textarea>
        
        <button onclick="importSave()" style="background: #fca311; color: #1b1b2f; width: 100%; margin-top: 10px; font-weight: bold;">
            Import Save Code
        </button>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <button onclick="deleteSave()" style="background: #e94560; color: white; padding: 5px 15px; font-size: 0.8em; opacity: 0.6;">
            Hard Reset Game
        </button>
    </div>
</div>

    <div id="admin-menu" style="display: none; position: fixed; bottom: 20px; right: 20px; background: #222; border: 2px solid #ff0055; padding: 20px; border-radius: 10px; z-index: 99999; text-align: left; box-shadow: 0 0 20px #000;">
        <h3 style="color: #ff0055; margin: 0 0 10px 0;">Arcane Debugger</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button onclick="cheatMana()">+1 Million Mana</button>
            <button onclick="cheatEssence()">+100 Essence</button>
            <button onclick="instaKill()">Insta-Kill</button>
            <button onclick="unlockAllArtifacts()">Unlock All</button>
            <button onclick="deleteSave()" style="background: #e94560;">Wipe Progress</button>
        </div>
    </div>

	<div id="artifact-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; justify-content:center; align-items:center; font-family: sans-serif;">
    	<div style="background:#1a1a2e; border:2px solid #f1c40f; padding:30px; border-radius:15px; text-align:center; max-width:350px; color:white; box-shadow: 0 0 20px #f1c40f;">
        	<h2 style="color:#f1c40f; margin-top:0;">New Artifact Found!</h2>
        	<div id="artifact-icon-popup" style="width:80px; height:80px; margin:10px auto; display:flex; align-items:center; justify-content:center; font-size:50px;"></div>
        	<h3 id="artifact-name-popup" style="margin:10px 0;">Item Name</h3>
        	<p id="artifact-desc-popup" style="font-size:0.9em; color:#bdc3c7;">Description goes here.</p>
        	<button onclick="closeArtifactPopup()" style="background:#f1c40f; color:#1a1a2e; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer; margin-top:15px;">Awesome!</button>
    	</div>
	</div>
	
  <script>
// --- 1. CORE VARIABLES ---
let mana = 0;
let essence = 0;
let globalMPS = 0;
let monsterHP = 50;
let monsterMaxHP = 50;
let monstersDefeated = 0;
let passiveDamageBuffer = 0;
let passiveTimer = 0;
let baseTickSpeed = 100;
let killsSinceLastArtifact = 0;
let manaPerKill = 5;
let isCurrentMonsterElite = false;
let spellCooldowns = {
    blast: false,
    siphon: false,
    storm: false
};

	  
const PITY_THRESHOLD = 20; 

const artifactPool = [
    { id: "wand", name: "Ancient Wand", icon: "🪄", owned: false, level: 1, bonus: 2, type: "damage", desc: "Increases Click & Blast damage." },
    { id: "robe", name: "Scholar's Robe", icon: "🥋", owned: false, level: 1, bonus: 0.1, type: "discount", desc: "10% discount on upgrades." },
    { id: "orb", name: "Crystal Ball", icon: "🔮", owned: false, level: 1, bonus: 0.25, type: "mps", desc: "Increases Global MPS by 25%." },
    { id: "hourglass", name: "Temporal Hourglass", icon: "⏳", owned: false, level: 1, bonus: 0.05, type: "speed", desc: "Makes the game tick 5% faster." },
    { id: "pouch", name: "Bottomless Pouch", icon: "💰", owned: false, level: 1, bonus: 1.2, type: "essence", desc: "Monsters drop 20% more Essence." },
    { id: "slayer", name: "Slayer's Mark", icon: "🎯", owned: false, level: 1, bonus: 2, type: "elite_damage", desc: "Deals massive bonus damage to Elite monsters." }
];

const upgrades = [
    { id: 'scribe', name: 'Apprentice Scribe', cost: 10, mps: 1, count: 0 },
    { id: 'well', name: 'Mana Well', cost: 100, mps: 8, count: 0 },
    { id: 'library', name: 'Arcane Library', cost: 1000, mps: 45, count: 0 },
    { id: 'tower', name: 'Wizard Tower', cost: 4000, mps: 100, count: 0 },
    { id: 'ball', name: 'Palantir', cost: 7500, mps: 300, count: 0 }
];

// --- 2. NAVIGATION LOGIC ---
window.showTab = function(tabName) {
    const tabs = ['sanctum', 'battle', 'compendium', 'settings']; 
    
    tabs.forEach(t => {
        const content = document.getElementById(t + '-tab');
        const btn = document.getElementById(t + '-btn');
        if (content) content.style.display = 'none';
        if (btn) btn.classList.remove('active');
    });

    const activeTab = document.getElementById(tabName + '-tab');
    if (activeTab) {
        activeTab.style.display = 'block';
        console.log("Showing tab: " + tabName);
    }
    
    const activeBtn = document.getElementById(tabName + '-btn');
    if (activeBtn) activeBtn.classList.add('active');

    // --- SECTION 4: THE FIXES ---
    
    // 1. Rename renderShop to renderSanctum
    if (tabName === 'sanctum') {
        renderSanctum(); 
    }

    // 2. Remove renderArtifacts from Battle (it lives in Compendium now)
    if (tabName === 'battle') {
        updateUI(); // Keep this to ensure the health bar is correct
    }

    // 3. Ensure this matches your artifact render function name
    if (tabName === 'compendium') {
        renderCompendium();
    }
};

// --- 3. SHOP & ECONOMY ---
function getAffordableAmount(upg, currentMana, discount) {
    let tempMana = currentMana;
    let tempCost = upg.cost;
    let count = 0;

    while (tempMana >= Math.floor(tempCost * (1 - discount))) {
        tempMana -= Math.floor(tempCost * (1 - discount));
        tempCost = Math.ceil(tempCost * 1.15);
        count++;
    }
    return count;
}

function renderSanctum() {
    // 1. Target the Sanctum container
    const container = document.getElementById('sanctum-display');
    if (!container) return;

    // 2. Clear it out (Only happens once on load or after a purchase)
    container.innerHTML = '';
    container.className = 'shop-container'; // Keeps the grid CSS

    // 3. Get the discount from the Scholar's Robe (if owned)
    const robe = artifactPool.find(a => a.id === 'robe');
    const discount = (robe && robe.owned) ? robe.bonus : 0;

    // 4. Create a card for every building in your upgrades list
    upgrades.forEach(upg => {
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        
        // We use IDs like 'buy1-${upg.id}' so updateUI can find them later
        card.innerHTML = `
            <div style="font-weight: bold; color: #4ecca3;">${upg.name}</div>
            <div id="level-${upg.id}" style="font-size: 0.8em; color: #888;">Level: ${upg.count}</div>
            <div style="font-size: 0.75em; color: #4ecca3; margin-bottom: 10px;">+${upg.mps} MPS</div>
            
            <div style="display: flex; flex-direction: column; gap: 5px; width: 100%;">
                <button id="buy1-${upg.id}" class="buy-btn" onclick="buyUpgrade('${upg.id}')">
                    Buy
                </button>
                <button id="max-${upg.id}" class="buy-btn max-btn" onclick="buyMax('${upg.id}')">
                    MAX
                </button>
            </div>
        `;
        container.appendChild(card);
    });
}
function buyUpgrade(id) {
    // 1. Find the building in your upgrades array
    const upg = upgrades.find(u => u.id === id);
    if (!upg) return;

    // 2. Calculate the discounted cost
    const robe = artifactPool.find(a => a.id === 'robe');
    const discount = (robe && robe.owned) ? robe.bonus : 0;
    const currentCost = Math.floor(upg.cost * (1 - discount));

    // 3. Check if player can afford it
    if (mana >= currentCost) {
        mana -= currentCost;
        upg.count++;
        
        // 4. Increase the cost for the next one (standard 15% increase)
        upg.cost = Math.ceil(upg.cost * 1.15);

        // 5. Update game state
        if (typeof calculateMPS === 'function') calculateMPS();
        
        // 6. Refresh the UI
        // We call renderSanctum here to update the static text (like Level)
        renderSanctum(); 
        updateUI();
        saveGame();
    } else {
        console.log("Not enough mana!");
    }
}

function buyMax(id) {
    const upg = upgrades.find(u => u.id === id);
    if (!upg) return;

    const robe = artifactPool.find(a => a.id === 'robe');
    const discount = (robe && robe.owned) ? robe.bonus : 0;

    // 1. Use the helper to see how many we can actually afford
    let amountToBuy = getAffordableAmount(upg, mana, discount);

    if (amountToBuy > 0) {
        let totalCost = 0;
        let tempCost = upg.cost;

        // 2. Loop through to calculate the total cumulative cost
        for (let i = 0; i < amountToBuy; i++) {
            const discountedPrice = Math.floor(tempCost * (1 - discount));
            totalCost += discountedPrice;
            tempCost = Math.ceil(tempCost * 1.15);
        }

        // 3. Final safety check on mana
        if (mana >= totalCost) {
            mana -= totalCost;
            upg.count += amountToBuy;
            upg.cost = tempCost; // Set the new base cost for the next purchase

            // 4. Update game state
            if (typeof calculateMPS === 'function') calculateMPS();
            
            // 5. Refresh the UI
            renderSanctum();
            updateUI();
            saveGame();
            
            console.log(`Bought ${amountToBuy} of ${upg.name}`);
        }
    }
}

function calculateMPS() {
    // 1. Calculate Base Production from Buildings
    // Standard reduce logic to sum up (count * mps) for each upgrade
    let baseMPS = upgrades.reduce((total, upg) => {
        return total + (upg.count * upg.mps);
    }, 0);

    // 2. Apply Artifact Multipliers
    const orb = artifactPool.find(a => a.id === 'orb');
    
    // We use the art.bonus property established in the upgradeArtifact function.
    // If the Orb is Level 1 with a 0.25 bonus, orbMult becomes 1.25.
    let orbMult = (orb && orb.owned) ? (1 + orb.bonus) : 1;

    // 3. Set Global State
    // We use Math.max to ensure MPS never accidentally drops below 0
    globalMPS = Math.max(0, baseMPS * orbMult);

	return globalMPS;
}

function startCooldown(spellId, duration) {
    // 1. Lock the spell in the background logic
    spellCooldowns[spellId] = true;
    
    // 2. Find the visual overlay and the button
    const overlay = document.getElementById(`cooldown-${spellId}`);
    
    // Find the button by its onclick function name
    const functionName = "cast" + spellId.charAt(0).toUpperCase() + spellId.slice(1);
    const btn = document.querySelector(`button[onclick*="${functionName}"]`);

    if (overlay) {
        // Reset transition and set height to 100% (completely dark)
        overlay.style.transition = "none";
        overlay.style.height = "100%";
        
        // Use a tiny timeout to allow the browser to register the "100%" height
        // before we start the transition back to 0%
        setTimeout(() => {
            overlay.style.transition = `height ${duration}s linear`;
            overlay.style.height = "0%";
        }, 50);
    }

    if (btn) {
        btn.disabled = true;
    }

    // 3. Unlock the spell after the duration ends
    setTimeout(() => {
        spellCooldowns[spellId] = false;
        if (btn) btn.disabled = false;
        
        // Clean up the overlay transition
        if (overlay) overlay.style.transition = "none";
        
        updateUI(); // Refresh UI to show the spell is ready
    }, duration * 1000);
}

function defeatMonster() {
    // 1. MONSTER DATA
    const monsters = [
        { name: "Shadow Imp", icon: "👿" },
        { name: "Void Wraith", icon: "👻" },
        { name: "Chaos Golem", icon: "🗿" },
        { name: "Abyssal Drake", icon: "🐲" }
    ];

    // 2. CALCULATE REWARDS FOR THE DEFEATED MONSTER
    // (We use the 'isCurrentMonsterElite' flag set from the PREVIOUS round)
    const eliteMult = isCurrentMonsterElite ? 3 : 1;
    const wandBonus = getArtifactBonus("wand");
    
    // Base Mana + Wand Bonus, scaled by total kills, then tripled if Elite
    manaPerKill = Math.floor((5 + wandBonus) * (1 + monstersDefeated * 0.1)) * eliteMult;
    
    // Essence logic + Pouch bonus, tripled if Elite
    const pouchBonus = getArtifactBonus("pouch") || 1; 
    const essenceGained = Math.floor(1 * pouchBonus) * eliteMult;

    // 3. APPLY REWARDS
    mana += manaPerKill;
    essence += essenceGained;
    monstersDefeated++;

    // 4. ARTIFACT DROP LOGIC (With Pity Timer)
    killsSinceLastArtifact++;
    // Elites have a 20% drop chance, Normals have 10%
    const dropChance = isCurrentMonsterElite ? 0.20 : 0.10; 
    
    if (Math.random() < dropChance || killsSinceLastArtifact >= 20) {
        if (typeof gainRandomArtifact === 'function') gainRandomArtifact();
        killsSinceLastArtifact = 0; // Reset pity timer
    }

    // 5. ROLL FOR NEXT MONSTER STATUS
    // This sets the flag for the monster that is about to appear
    isCurrentMonsterElite = Math.random() < 0.10; 
    const nextEliteMult = isCurrentMonsterElite ? 3 : 1;

    // 6. SCALE STATS FOR NEXT MONSTER
    // Uses exponential scaling so health doesn't stay flat
    monsterMaxHP = Math.floor(50 * Math.pow(1.12, monstersDefeated)) * nextEliteMult;
    monsterHP = monsterMaxHP;

    // 7. UI VISUALS
    const roll = monsters[Math.floor(Math.random() * monsters.length)];
    const nameEl = document.getElementById('monster-name');
    const spriteEl = document.getElementById('monster-sprite');
    const log = document.getElementById('battle-log');
    
    if (nameEl) {
        nameEl.innerText = isCurrentMonsterElite ? "✨ ELITE " + roll.name : roll.name;
        nameEl.style.color = isCurrentMonsterElite ? "#f1c40f" : "#fff";
    }
    
    if (spriteEl) {
        spriteEl.innerText = roll.icon;
        spriteEl.style.transform = isCurrentMonsterElite ? "scale(1.4)" : "scale(1.0)";
        spriteEl.style.filter = isCurrentMonsterElite ? "drop-shadow(0 0 15px #f1c40f)" : "none";
    }

    if (log) {
        log.style.color = isCurrentMonsterElite ? "#f1c40f" : "#fff";
        log.innerText = `Victory! +${manaPerKill.toLocaleString()} Mana, +${essenceGained} Ess.`;
    }

    // 8. FINAL SYNC
    updateUI();
    if (typeof saveGame === 'function') saveGame();
}

function upgradeArtifact(id) {
    // 1. Find the specific artifact in your pool
    const art = artifactPool.find(a => a.id === id);
    
    // 2. Safety check: if the artifact doesn't exist or isn't owned, stop
    if (!art || !art.owned) {
        console.error("Artifact not found or not owned.");
        return;
    }

    // 3. Calculate the Upgrade Cost
    // Formula: 10 * (2 ^ (level - 1)) -> Level 1=10, 2=20, 3=40, 4=80...
    const upgradeCost = Math.pow(2, art.level - 1) * 10;

    // 4. Check Essence Balance
    if (essence >= upgradeCost) {
        // Deduct Currency
        essence -= upgradeCost;
        
        // Increase Level
        art.level++;

        // 5. Apply the Power Boost
        // This scales the bonus based on the artifact's specific type
        applyArtifactPowerBoost(art);

        // 6. Refresh the Entire Game State
        if (typeof calculateMPS === 'function') calculateMPS(); // Recalculate income
        renderCompendium(); // Redraw the grid in Compendium
        updateUI();        // Refresh all numbers and button states
        
        // 7. Auto-Save
        if (typeof saveGame === 'function') saveGame();

        console.log(`Success! ${art.name} is now Level ${art.level}`);
    } else {
        console.warn("Insufficient Essence for this upgrade.");
        // Optional: Trigger a visual shake on the button or a message
    }
}

/**
 * Helper function to define HOW each artifact scales.
 * You can customize these numbers to balance your game.
 */
function applyArtifactPowerBoost(art) {
    switch(art.id) {
        case 'robe': // Scholar's Robe (Discount)
            // Increases discount by 2% per level (maxing at 0.02 * level)
            art.bonus += 0.02; 
            break;
        case 'ball': // Crystal Ball (MPS Multiplier)
            // Increases global MPS by 5% per level
            art.bonus += 0.05;
            break;
        case 'slayer': // Mage Slayer (Combat Damage)
            // Increases damage vs Elites by 10% per level
            art.bonus += 0.10;
            break;
        case 'tome': // Arcane Tome (Spell Damage)
            // Increases spell damage by 7% per level
            art.bonus += 0.07;
            break;
        default:
            // Generic fallback if you add new artifacts later
            art.bonus += 0.01;
    }
}

function gameLoop() {
    const hourglass = artifactPool.find(a => a.id === 'hourglass');
    let speedMult = (hourglass && hourglass.owned) ? (1 - (hourglass.level * 0.05)) : 1;
    let tickDelay = Math.max(20, baseTickSpeed * speedMult);

    mana += (globalMPS / 10);
    if (monsterHP > 0) {
        let pDmg = (globalMPS * 0.01);
        monsterHP -= pDmg;
        passiveDamageBuffer += pDmg;
        if (monsterHP <= 0) defeatMonster();
    }

	if (Math.random() < 0.01) { // Roughly every 10 seconds at 100ms ticks
    saveGame();
	}
	
    passiveTimer++;
    if (passiveTimer >= 10) {
        if (passiveDamageBuffer >= 1) createDamagePopup(Math.ceil(passiveDamageBuffer), true);
        passiveDamageBuffer = 0;
        passiveTimer = 0;
    }
    updateUI();
    updateCombatUI();
    setTimeout(gameLoop, tickDelay);
}

function updateUI() {
    // --- 1. CORE CURRENCIES ---
    const mDisplay = document.getElementById('mana-display');
    const eDisplay = document.getElementById('essence-display');
    if (mDisplay) mDisplay.innerText = Math.floor(mana).toLocaleString();
    if (eDisplay) eDisplay.innerText = Math.floor(essence).toLocaleString();

    // --- 2. MPS DISPLAY (The Visual Fix) ---
    const mpsDisplay = document.getElementById('mps-display');
    if (mpsDisplay) {
        // We call the math-only version of calculateMPS here
        const currentMPS = calculateMPS(); 
        mpsDisplay.innerText = `Mana Flow: ${currentMPS.toLocaleString(undefined, {
            minimumFractionDigits: 1,
            maximumFractionDigits: 1
        })} /sec`;
    }

    // --- 3. SANCTUM (Buildings & Discounts) ---
    const robe = artifactPool.find(a => a.id === 'robe');
    const discount = (robe && robe.owned) ? robe.bonus : 0;

    upgrades.forEach(upg => {
        const currentCost = Math.floor(upg.cost * (1 - discount));
        const affordable = getAffordableAmount(upg, mana, discount);

        const b1Btn = document.getElementById(`buy1-${upg.id}`);
        if (b1Btn) {
            b1Btn.disabled = (mana < currentCost);
            b1Btn.innerText = `Buy: ${currentCost.toLocaleString()}`;
        }

        const mxBtn = document.getElementById(`max-${upg.id}`);
        if (mxBtn) {
            mxBtn.disabled = (affordable === 0);
            mxBtn.innerText = `MAX (+${affordable})`;
        }
        
        const lvlTxt = document.getElementById(`level-${upg.id}`);
        if (lvlTxt) lvlTxt.innerText = `Level: ${upg.count}`;
    });

    // --- 4. COMPENDIUM (Artifact Upgrades & Scaling) ---
    artifactPool.forEach(art => {
        const artBtn = document.getElementById(`upgrade-art-${art.id}`);
        const artLvlTxt = document.getElementById(`art-level-${art.id}`);
        const artBonusTxt = document.getElementById(`art-bonus-${art.id}`);

        if (art.owned) {
            // Cost scales: 10, 20, 40, 80...
            const upgradeCost = Math.pow(2, art.level - 1) * 10;
            
            if (artBtn) {
                artBtn.disabled = (essence < upgradeCost);
                artBtn.innerText = `Upgrade: ${upgradeCost.toLocaleString()} Essence`;
            }

            if (artLvlTxt) artLvlTxt.innerText = `Lv. ${art.level}`;
            
            if (artBonusTxt) {
                // Damage and Essence are multipliers (x), others are percentages (%)
                const isMultiplier = art.type === "damage" || art.type === "essence";
                const displayValue = isMultiplier ? (art.bonus * art.level).toFixed(1) : (art.bonus * 100).toFixed(0);
                const suffix = isMultiplier ? "x" : "%";
                artBonusTxt.innerText = `+${displayValue}${suffix} Bonus`;
            }
        }
    });

    // --- 5. EXTERNAL SYSTEMS ---
    if (typeof updateMonsterUI === "function") updateMonsterUI(); 
    if (typeof updateSpellButtons === "function") updateSpellButtons();
}

function updateCombatUI() {
    const pct = Math.max(0, (monsterHP / monsterMaxHP) * 100);
    document.getElementById('hp-bar').style.width = pct + "%";
    document.getElementById('hp-text').innerText = `HP: ${Math.ceil(monsterHP)} / ${monsterMaxHP}`;
    const btn = document.getElementById('attack-btn');
    if (btn) btn.disabled = (mana < 10);
}

// --- 7. SAVE SYSTEM ---
function saveGame() {
    try {
        const state = {
            mana: Number(mana),
            essence: Number(essence),
            monstersDefeated: Number(monstersDefeated),
            monsterMaxHP: Number(monsterMaxHP),
            killsSinceLastArtifact: killsSinceLastArtifact,
			// Map upgrades to a simple array of counts/costs
            upgrades: upgrades.map(u => ({ count: u.count, cost: u.cost })),
            // Map artifacts to their owned status and levels
            artifacts: artifactPool.map(a => ({ id: a.id, owned: a.owned, level: a.level }))
        };
        localStorage.setItem("wizardIdle_v1", JSON.stringify(state));
        console.log("Game Saved Successfully");
    } catch (e) {
        console.error("Save Error:", e);
    }
}

function loadGame() {
    try {
        const saved = localStorage.getItem("wizardIdle_v1");
        if (!saved) return;

        const data = JSON.parse(saved);
        
        // Load basic resources
        mana = Number(data.mana) || 0;
        essence = Number(data.essence) || 0;
        monstersDefeated = Number(data.monstersDefeated) || 0;
        monsterMaxHP = Number(data.monsterMaxHP) || 50;
        monsterHP = monsterMaxHP; // Reset HP to full on load
		killsSinceLastArtifact = Number(data.killsSinceLastArtifact) || 0;
		
        // Load Upgrades
        if (data.upgrades) {
            data.upgrades.forEach((savedUpg, i) => {
                if (upgrades[i]) {
                    upgrades[i].count = savedUpg.count || 0;
                    upgrades[i].cost = savedUpg.cost || upgrades[i].cost;
                }
            });
        }

        // Load Artifacts
        if (data.artifacts) {
            data.artifacts.forEach(savedArt => {
                const art = artifactPool.find(a => a.id === savedArt.id);
                if (art) {
                    art.owned = savedArt.owned;
                    art.level = savedArt.level || 1;
                }
            });
        }
        
        console.log("Game Loaded Successfully");
    } catch (e) {
        console.error("Load Error:", e);
    }
}

	  function exportSave() {
    try {
        // 1. Package all current game variables into one object
        const saveState = {
            mana: typeof mana !== 'undefined' ? mana : 0,
            essence: typeof essence !== 'undefined' ? essence : 0,
            monstersDefeated: typeof monstersDefeated !== 'undefined' ? monstersDefeated : 0,
            monsterMaxHP: typeof monsterMaxHP !== 'undefined' ? monsterMaxHP : 50,
            killsSinceLastArtifact: killsSinceLastArtifact,
				
            // Map the upgrades to a clean array
            upgrades: upgrades.map(u => ({ 
                count: u.count, 
                cost: u.cost 
            })),
            
            // Map the artifacts to ensure we only save what's necessary
            artifacts: artifactPool.map(a => ({ 
                id: a.id, 
                owned: a.owned, 
                level: a.level || 1 
            })),
            
            // Add a timestamp so you know when the save was made
            timestamp: Date.now(),
            version: "1.0.0"
        };

        // 2. Convert object to JSON string, then to Base64
        const jsonStr = JSON.stringify(saveState);
        const encodedSave = btoa(jsonStr);

        // 3. Display the code in the textarea
        const saveBox = document.getElementById('save-box');
        if (saveBox) {
            saveBox.value = encodedSave;
            saveBox.focus();
            saveBox.select();
        }

        // 4. Attempt to copy to clipboard
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(encodedSave).then(() => {
                handleExportFeedback();
            }).catch(err => {
                // Fallback if Clipboard API fails
                document.execCommand('copy');
                handleExportFeedback();
            });
        } else {
            document.execCommand('copy');
            handleExportFeedback();
        }

    } catch (e) {
        console.error("Export Error:", e);
        alert("Wizard Council Error: Could not enchant save string.");
    }
}

// Helper function to show the user it worked
function handleExportFeedback() {
    const exportBtn = document.querySelector("button[onclick='exportSave()']");
    if (exportBtn) {
        const originalText = exportBtn.innerText;
        exportBtn.innerText = "✨ SAVED TO CLIPBOARD! ✨";
        exportBtn.style.background = "#4ecca3";
        
        setTimeout(() => {
            exportBtn.innerText = originalText;
            exportBtn.style.background = ""; // Returns to CSS default
        }, 2500);
    }
}

function importSave() {
    try {
        const saveBox = document.getElementById('save-box');
        const encodedData = saveBox.value.trim();

        if (!encodedData) {
            alert("The scroll is empty! Please paste a save code.");
            return;
        }

        // 1. Decode the Base64 string back into JSON
        const jsonStr = atob(encodedData);
        const saveState = JSON.parse(jsonStr);

        // 2. Restore core variables
        mana = saveState.mana || 0;
        essence = saveState.essence || 0;
        monstersDefeated = saveState.monstersDefeated || 0;
        monsterMaxHP = saveState.monsterMaxHP || 50;

        // 3. Restore the Artifact Pity Counter
        // The "|| 0" ensures it works even for saves from the older version
        killsSinceLastArtifact = saveState.killsSinceLastArtifact || 0;

        // 4. Restore Upgrades (Mapping back to the live array)
        if (saveState.upgrades) {
            saveState.upgrades.forEach((savedUp, index) => {
                if (upgrades[index]) {
                    upgrades[index].count = savedUp.count;
                    upgrades[index].cost = savedUp.cost;
                }
            });
        }

        // 5. Restore Artifacts
        if (saveState.artifacts) {
            saveState.artifacts.forEach(savedArt => {
                const realArt = artifactPool.find(a => a.id === savedArt.id);
                if (realArt) {
                    realArt.owned = savedArt.owned;
                    realArt.level = savedArt.level || 1;
                }
            });
        }

        // 6. Force a save to LocalStorage so progress persists
        const finalSave = JSON.stringify(saveState);
        localStorage.setItem("wizardIdle_save", finalSave);

        // 7. Refresh the UI and provide feedback
        alert("✨ Save Successfully Imported! ✨");
        
        // Reloading the page is the safest way to ensure all game 
        // loops and logic restart with the new data.
        location.reload();

    } catch (e) {
        console.error("Import Error:", e);
        alert("Failed to read the save code. It may be corrupted or from an incompatible version.");
    }
}

// --- 8. ADMIN FUNCTIONS ---
function cheatMana() { mana += 1000000; renderShop(); updateUI(); }
function cheatEssence() { essence += 100; updateUI(); }
function instaKill() { monsterHP = 0; defeatMonster(); }
function unlockAllArtifacts() { artifactPool.forEach(a => a.owned = true); renderArtifacts(); renderCompendium(); }
function deleteSave() { 
    if (confirm("Are you sure? This will wipe ALL progress and restart the game.")) { 
        localStorage.removeItem("wizardIdle_v1"); // Must match the key in saveGame()
        location.reload(); 
    } 
}

window.addEventListener('keydown', (e) => {
    // Check for backtick (`) or Tilde (~)
    if (e.key === '`' || e.key === '~' || e.keyCode === 192) {
        e.preventDefault(); // Stop the character from being typed
        const menu = document.getElementById('admin-menu');
        if (menu) {
            const isHidden = menu.style.display === 'none';
            menu.style.display = isHidden ? 'block' : 'none';
            console.log("Admin menu toggled: " + menu.style.display);
        }
    }
});

    console.log("Game Initializing...");
    
    // 1. Load player data
    try {
        loadGame();
    } catch(e) {
        console.error("Failed to load save:", e);
    }

    // 2. Build the UI
    // Note: I removed the extra 'renderArtifacts' call. 
    // We only need renderCompendium for the artifacts tab.
    calculateMPS();
    renderSanctum();    // Draws the Buildings
    renderCompendium(); // Draws the Artifacts
    
    // 3. Set default tab
    // CRITICAL: Make sure 'sanctum' is the ID of your building tab
    showTab('sanctum');
    
    // 4. Start the game heartbeat
    // Make sure your gameLoop() calls updateUI()!
    gameLoop();
    
    console.log("Initialization Complete.");
};
